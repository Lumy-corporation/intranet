<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Facturation</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white p-6">

<!-- HEADER -->
<div class="flex justify-between items-start mb-6">
  <div>
    <h1 class="text-2xl font-bold">Gestion des factures</h1>
    <p id="count" class="text-gray-400 text-sm"></p>
  </div>

  <button onclick="openModal()" class="bg-blue-600 px-4 py-2 rounded-lg">
    + Nouvelle facture
  </button>
</div>

<!-- FILTERS -->
<div class="flex gap-2 mb-6">
  <button onclick="setFilter('all')" class="btn">Toutes</button>
  <button onclick="setFilter('pending')" class="btn">En attente</button>
  <button onclick="setFilter('paid')" class="btn">Payées</button>
  <button onclick="setFilter('failed')" class="btn">Échouées</button>
</div>

<!-- STATS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">

  <div class="bg-gray-900 p-4 rounded-xl">
    <p class="text-gray-400 text-xs">Total encaissé</p>
    <p id="paidTotal" class="text-emerald-400 text-xl font-bold"></p>
  </div>

  <div class="bg-gray-900 p-4 rounded-xl">
    <p class="text-gray-400 text-xs">En attente</p>
    <p id="pendingTotal" class="text-amber-400 text-xl font-bold"></p>
  </div>

  <div class="bg-gray-900 p-4 rounded-xl">
    <p class="text-gray-400 text-xs">Payées</p>
    <p id="paidCount" class="text-emerald-400 text-xl font-bold"></p>
  </div>

  <div class="bg-gray-900 p-4 rounded-xl">
    <p class="text-gray-400 text-xs">Échouées</p>
    <p id="failedCount" class="text-red-400 text-xl font-bold"></p>
  </div>

</div>

<!-- TABLE -->
<div class="bg-gray-900 rounded-xl p-4">
  <table class="w-full text-left">
    <thead>
      <tr class="text-gray-400 text-sm">
        <th>Client</th>
        <th>Email</th>
        <th>Montant</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="bg-gray-900 p-6 rounded-xl w-[400px] space-y-3">

    <h2 class="text-lg font-bold" id="modalTitle">Nouvelle facture</h2>

    <input id="name" placeholder="Nom client" class="input"/>
    <input id="email" placeholder="Email" class="input"/>
    <input id="amount" type="number" placeholder="Montant" class="input"/>

    <select id="status" class="input">
      <option value="pending">En attente</option>
      <option value="paid">Payée</option>
      <option value="failed">Échouée</option>
    </select>

    <textarea id="desc" placeholder="Description" class="input"></textarea>

    <div class="flex justify-end gap-2 pt-2">
      <button onclick="closeModal()" class="px-3 py-2 bg-gray-700 rounded">Annuler</button>
      <button onclick="saveInvoice()" class="px-3 py-2 bg-blue-600 rounded">Enregistrer</button>
    </div>

  </div>
</div>

<style>
.btn {
  background:#1f2937;
  padding:6px 12px;
  border-radius:8px;
}
.btn:hover { background:#374151; }

.input {
  width:100%;
  padding:8px;
  background:#111827;
  border-radius:6px;
  border:1px solid #374151;
  color:white;
}
</style>

<script>

/* ---------------- DATA ---------------- */

let invoices = JSON.parse(localStorage.getItem("invoices") || "[]");
let filter = "all";
let editId = null;

/* ---------------- OPEN / CLOSE ---------------- */

function openModal() {
  document.getElementById("modal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
  clearForm();
  editId = null;
}

/* ---------------- FILTER ---------------- */

function setFilter(f) {
  filter = f;
  render();
}

/* ---------------- SAVE ---------------- */

function saveInvoice() {
  const data = {
    id: editId || Date.now().toString(),
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    amount: Number(document.getElementById("amount").value),
    status: document.getElementById("status").value,
    desc: document.getElementById("desc").value
  };

  if (editId) {
    invoices = invoices.map(i => i.id === editId ? data : i);
  } else {
    invoices.push(data);
  }

  localStorage.setItem("invoices", JSON.stringify(invoices));

  closeModal();
  render();
}

/* ---------------- EDIT ---------------- */

function editInvoice(id) {
  const inv = invoices.find(i => i.id === id);
  editId = id;

  document.getElementById("name").value = inv.name;
  document.getElementById("email").value = inv.email;
  document.getElementById("amount").value = inv.amount;
  document.getElementById("status").value = inv.status;
  document.getElementById("desc").value = inv.desc;

  openModal();
}

/* ---------------- DELETE ---------------- */

function deleteInvoice(id) {
  invoices = invoices.filter(i => i.id !== id);
  localStorage.setItem("invoices", JSON.stringify(invoices));
  render();
}

/* ---------------- CLEAR ---------------- */

function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("email").value = "";
  document.getElementById("amount").value = "";
  document.getElementById("status").value = "pending";
  document.getElementById("desc").value = "";
}

/* ---------------- RENDER ---------------- */

function render() {
  let list = invoices;

  if (filter !== "all") {
    list = invoices.filter(i => i.status === filter);
  }

  document.getElementById("count").innerText =
    `${invoices.length} facture(s)`;

  const tbody = document.getElementById("table");
  tbody.innerHTML = "";

  list.forEach(inv => {
    const tr = document.createElement("tr");
    tr.className = "border-t border-gray-800";

    tr.innerHTML = `
      <td class="py-2">${inv.name}</td>
      <td>${inv.email}</td>
      <td>${inv.amount}€</td>
      <td>${inv.status}</td>
      <td class="flex gap-2">
        <button onclick="editInvoice('${inv.id}')">✏️</button>
        <button onclick="deleteInvoice('${inv.id}')">🗑️</button>
      </td>
    `;

    tbody.appendChild(tr);
  });

  updateStats();
}

/* ---------------- STATS ---------------- */

function updateStats() {
  const paid = invoices.filter(i => i.status === "paid");

  document.getElementById("paidTotal").innerText =
    paid.reduce((a,b)=>a + b.amount,0) + "€";

  document.getElementById("pendingTotal").innerText =
    invoices.filter(i => i.status === "pending").length;

  document.getElementById("paidCount").innerText =
    paid.length;

  document.getElementById("failedCount").innerText =
    invoices.filter(i => i.status === "failed").length;
}

/* INIT */
render();

</script>

</body>
</html>
