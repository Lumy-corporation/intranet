<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LUMY CORE | FACTURATION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --bg: #0a0a0c; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .facture-form { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; max-width: 600px; margin: auto; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; }
        .btn-generate { background: var(--cyan); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 1rem; }
        label { font-size: 0.8rem; color: #777; }
    </style>
</head>
<body>

    <div class="facture-form">
        <h2 style="color:var(--cyan); text-align:center;">ÉMISSION DE FACTURE</h2>
        
        <label>NOM DU CLIENT / ENTREPRISE</label>
        <input type="text" id="client" placeholder="Ex: Mairie de Paris / Client X">
        
        <label>DESCRIPTION DE LA PRESTATION</label>
        <input type="text" id="designation" placeholder="Ex: Prestation de service Lumy">
        
        <div style="display:flex; gap:10px;">
            <div>
                <label>MONTANT HT (€)</label>
                <input type="number" id="montant" placeholder="0.00" oninput="calculer()">
            </div>
            <div>
                <label>TVA (%)</label>
                <input type="number" id="tva" value="20" oninput="calculer()">
            </div>
        </div>

        <div style="background:#000; padding:15px; border-radius:10px; margin: 15px 0; border: 1px dashed var(--cyan);">
            <p>TOTAL TTC : <span id="total" style="color:var(--cyan); font-weight:bold;">0.00</span> €</p>
        </div>

        <button class="btn-generate" onclick="generatePDF()">GÉNÉRER LA FACTURE (PDF)</button>
    </div>

    <script>
        const { jsPDF } = window.jspdf;

        function calculer() {
            const m = parseFloat(document.getElementById('montant').value) || 0;
            const t = parseFloat(document.getElementById('tva').value) || 0;
            const total = m + (m * t / 100);
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function generatePDF() {
            const doc = new jsPDF();
            const client = document.getElementById('client').value;
            const desc = document.getElementById('designation').value;
            const ht = document.getElementById('montant').value;
            const tva = document.getElementById('tva').value;
            const ttc = document.getElementById('total').innerText;
            const date = new Date().toLocaleDateString();
            const numFacture = "FAC-" + Date.now().toString().slice(-6);

            // --- DESIGN DE LA FACTURE ---
            doc.setFontSize(22);
            doc.setTextColor(0, 242, 255);
            doc.text("LUMY CORPORATION", 20, 20);
            
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text("SIRET: 123 456 789 00012", 20, 30);
            doc.text("Numéro de facture : " + numFacture, 140, 30);
            doc.text("Date : " + date, 140, 35);

            doc.setTextColor(0);
            doc.setFontSize(12);
            doc.text("DESTINATAIRE :", 20, 60);
            doc.text(client, 20, 68);

            // Tableau simple
            doc.line(20, 80, 190, 80);
            doc.text("Description", 25, 87);
            doc.text("Total HT", 160, 87);
            doc.line(20, 90, 190, 90);

            doc.text(desc, 25, 100);
            doc.text(ht + " EUR", 160, 100);

            // Totaux
            doc.line(120, 120, 190, 120);
            doc.text("Total HT : " + ht + " EUR", 130, 130);
            doc.text("TVA ("+tva+"%) : " + (ht*tva/100).toFixed(2) + " EUR", 130, 138);
            doc.setFontSize(14);
            doc.text("TOTAL TTC : " + ttc + " EUR", 130, 150);

            // Mention légale (très important pour l'État)
            doc.setFontSize(8);
            doc.setTextColor(150);
            doc.text("Paiement par virement bancaire. En cas de retard, une indemnité forfaitaire", 20, 280);
            doc.text("de 40€ pour frais de recouvrement sera appliquée.", 20, 284);

            doc.save(`Facture_Lumy_${numFacture}.pdf`);
        }
    </script>
</body>
</html>
