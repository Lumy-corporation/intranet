<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LUMY CORE | GOOGLE AUTH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --cyan: #00f2ff; --bg: #0a0a0c; --card: #141417; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        
        /* ÉCRAN DE LOGIN GOOGLE */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        .btn-google {
            background: white; color: #000; border: none; padding: 15px 25px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px;
            font-size: 1rem; transition: 0.3s;
        }
        .btn-google:hover { background: #eee; transform: scale(1.05); }

        #dashboard { display: none; padding: 30px; }
        .admin-card { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; text-align: left; border-bottom: 1px solid #1a1a1a; }
        .btn-paff { background: var(--cyan); color: black; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.6rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-family:'Orbitron'; color:var(--cyan); margin-bottom:30px;">LUMY CORE ACCESS</h1>
        <button class="btn-google" onclick="loginGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            SE CONNECTER AVEC LUMYCORP.COM
        </button>
    </div>

    <div id="dashboard">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-family:'Orbitron';">UNITÉ : <span id="user-display" style="color:var(--cyan)"></span></h2>
            <button onclick="logout()" style="color:red; background:none; border:1px solid red; cursor:pointer; border-radius:5px; padding:5px 10px;">DECONNEXION</button>
        </div>

        <div class="admin-card">
            <h3>📥 NOUVELLES INSCRIPTIONS</h3>
            <table>
                <thead><tr><th>Candidat</th><th>Poste</th><th>Action</th></tr></thead>
                <tbody id="list-inscriptions"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCjIUOQogsQUhRgYJgN1OlErEt3FsihZuo",
            authDomain: "lumy-corporation-1db3f.firebaseapp.com",
            databaseURL: "https://lumy-corporation-1db3f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lumy-corporation-1db3f",
            appId: "1:1023452628363:web:0806d0bc81436c0446db8e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 1. CONNEXION GOOGLE
        function loginGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Optionnel : Forcer la restriction au domaine @lumycorp.com
            // provider.setCustomParameters({ hd: 'lumycorp.com' }); 
            auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut(); }

        // 2. SURVEILLANCE DE LA SESSION (SSO)
        auth.onAuthStateChanged(user => {
            if (user) {
                // L'utilisateur est reconnu (par Google)
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('user-display').innerText = user.displayName;
                chargerDonnees();
            } else {
                // Pas de session active
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        // 3. RÉCUPÉRATION DES DONNÉES (Seulement si authentifié)
        function chargerDonnees() {
            db.ref('inscriptions').on('value', snap => {
                const tbody = document.getElementById('list-inscriptions');
                tbody.innerHTML = "";
                snap.forEach(child => {
                    const d = child.val();
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${d.prenom} ${d.nom}</strong><br><small>${d.email}</small></td>
                            <td>${d.secteur_lumy}</td>
                            <td><button class="btn-paff" onclick="paff('${child.key}')">VALIDER PAFF !</button></td>
                        </tr>`;
                });
            });
        }

        async function paff(key) {
            const snap = await db.ref('inscriptions/' + key).once('value');
            const d = snap.val();
            // Logique de transfert identique...
            await db.ref('users/' + key).set({ ...d, date_entree: new Date().toLocaleDateString() });
            await db.ref('inscriptions/' + key).remove();
            alert("Membre ajouté !");
        }
    </script>
</body>
</html>
