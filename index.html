<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LUMY CORE | AUTH</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { background: #111; padding: 50px; border-radius: 20px; border: 1px solid #222; text-align: center; box-shadow: 0 0 40px rgba(0, 242, 255, 0.1); width: 350px; }
        h1 { font-family: 'Orbitron'; color: #00f2ff; letter-spacing: 5px; margin-bottom: 30px; }
        #g_id_onload { margin-top: 20px; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h1>LUMY CORE</h1>
        <p style="opacity: 0.5; font-size: 0.8rem; margin-bottom: 30px;">ACCÈS UNITÉ DE CONTRÔLE</p>

        <div id="g_id_onload"
             data-client_id="280639681515-s3mthshvuqqc19s138j87o37br67qf9b.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left">
        </div>

        <p id="status" style="margin-top:20px; font-size:0.7rem; color:#444;">En attente d'identification...</p>
    </div>

    <script>
        function handleCredentialResponse(response) {
            // Ici, Google nous a envoyé le jeton (le "badge" d'accès)
            console.log("Jeton reçu de Google : " + response.credential);
            
            document.getElementById('status').innerText = "VÉRIFICATION RÉUSSIE... REDIRECTION...";
            document.getElementById('status').style.color = "#00ff88";

            // PAFF ! On envoie sur le dashboard
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);
        }
    </script>
</body>
</html>
