<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AUTH | LUMY CORP</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body {
            background-color: #000; color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            margin: 0;
        }
        .login-card {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 12px;
            width: 100%; max-width: 380px; text-align: center;
            backdrop-filter: blur(10px);
        }
        .logo-img { width: 70px; margin-bottom: 24px; }
        h1 { font-family: 'Orbitron'; font-size: 1.1rem; letter-spacing: 4px; margin-bottom: 32px; }
        
        /* Conteneur pour le bouton Google */
        #google_btn_container {
            display: flex; justify-content: center; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="https://lumycorp.com/logo.png" alt="Lumy" class="logo-img">
        <h1>LUMY CORE</h1>

        <div id="google_btn_container">
            <div id="g_id_onload"
                 data-client_id="280639681515-s3mthshvuqqc19s138j87o37br67qf9b.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false"
                 data-hd="lumycorp.com"> </div>

            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>

        <div id="error-msg" style="display:none; color:red; margin-top:20px; font-size:0.8rem;">
            Accès refusé. Utilisez @lumycorp.com
        </div>
    </div>
<p style="font-size: 10px; color: #444; margin-top: 15px;">
    En vous connectant, vous acceptez que LUMY CORP traite vos données de profil (nom, email, photo) 
    pour la gestion de l'accès à l'intranet. <br>
    <a href="#" style="color: #666;">Politique de confidentialité</a>
</p>
<script>
    function handleCredentialResponse(response) {
        // 1. On décode les infos de Google
        const responsePayload = parseJwt(response.credential);
        
        // 2. On vérifie si c'est un mail @lumycorp.com
        if (responsePayload.email.endsWith("@lumycorp.com")) {
            
            // --- ÉTAPE CRUCIALE : On enregistre les infos pour le Dashboard ---
            localStorage.setItem('userName', responsePayload.name);
            localStorage.setItem('userPic', responsePayload.picture);
            localStorage.setItem('userEmail', responsePayload.email);

            console.log("Accès autorisé, redirection...");
            
            // 3. On va sur le dashboard
            window.location.href = "dashboard.html";
            
        } else {
            // Si c'est un mail Gmail perso par exemple
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('error-msg').innerText = "Accès refusé. Seul le domaine @lumycorp.com est autorisé.";
        }
    }

    // Fonction pour lire le jeton Google (ne pas toucher)
    function parseJwt (token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    };
</script>
    
</body>
</html>
