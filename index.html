<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL D'ACCÈS | LUMY CORP</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/auth.js"></script>
</head>
<body class="flex-center">
    <div class="login-card">
        <img src="https://lumycorp.com/logo.png" alt="Lumy" style="width:80px; margin-bottom:20px;">
        <h1>LUMY CORE</h1>
        
        <div id="g_id_onload"
             data-client_id="280639681515-s3mthshvuqqc19s138j87o37br67qf9b.apps.googleusercontent.com"
             data-callback="handleSignIn">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-size="large"></div>

        <div id="error-msg" class="error-msg"></div>
        <p style="font-size: 9px; color: #444; margin-top: 30px;">SYSTÈME PROPRIÉTAIRE LUMY CORP.</p>
    </div>

    <script>
        function handleSignIn(response) {
            const payload = parseJwt(response.credential);
            if (payload.email && payload.email.endsWith("@lumycorp.com")) {
                // Stockage des infos de base
                localStorage.setItem('userName', payload.name);
                localStorage.setItem('userEmail', payload.email);
                localStorage.setItem('token_expiry', Date.now() + (3600 * 1000));
                
                // Redirection vers le dashboard qui gérera le Token complet
                window.location.href = "dashboard.html";
            } else {
                const e = document.getElementById('error-msg');
                e.innerText = "ACCÈS RÉSERVÉ @LUMYCORP.COM";
                e.style.display = 'block';
            }
        }
    </script>
</body>
</html>
