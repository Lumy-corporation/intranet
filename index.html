<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LUMY CORE | SYSTEM ACCESS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
:root{
    --bg:#03060c;
    --panel:#0b111b;
    --panel2:#0f1624;
    --accent:#00f2ff;
    --text:#e8f0ff;
    --muted:#6c7a92;
    --border:rgba(255,255,255,0.08);
}

/* GLOBAL */
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
    height:100vh;
    display:flex;
    background:var(--bg);
    color:var(--text);
}

/* LEFT PANEL (ADMIN SYSTEM) */
.left{
    width:50%;
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,242,255,0.08), transparent 40%),
        var(--bg);
}

/* TITLE */
h1{
    font-family:Orbitron;
    letter-spacing:6px;
    font-size:26px;
    color:var(--accent);
    margin-bottom:20px;
}

/* DESCRIPTION */
.desc{
    color:var(--muted);
    font-size:13px;
    line-height:1.6;
    max-width:400px;
}

/* SYSTEM STATUS */
.status-box{
    margin-top:40px;
    border:1px solid var(--border);
    padding:20px;
    border-radius:10px;
    background:var(--panel);
}

.status-line{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin-bottom:10px;
}

/* ANIM DOT */
.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--accent);
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:0.3}
    50%{opacity:1}
    100%{opacity:0.3}
}

/* RIGHT PANEL (LOGIN) */
.right{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--panel);
    border-left:1px solid var(--border);
}

/* LOGIN BLOCK */
.auth{
    width:360px;
}

/* TITLE */
.auth-title{
    font-family:Orbitron;
    letter-spacing:4px;
    color:var(--accent);
    margin-bottom:10px;
}

.sub{
    font-size:12px;
    color:var(--muted);
    margin-bottom:30px;
}

/* BUTTON WRAP */
.g_id_signin{
    display:flex;
    justify-content:center;
}

/* STATUS */
#status{
    margin-top:20px;
    font-size:11px;
    color:var(--muted);
}

/* HOVER INTERACTION */
.auth:hover{
    transform:translateY(-2px);
    transition:0.3s;
}

/* BACKGROUND GRID */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size:50px 50px;
    pointer-events:none;
}
</style>
</head>

<body>

<!-- LEFT PANEL -->
<div class="left">

    <h1>LUMY CORE</h1>

    <div class="desc">
        Interface administrative interne sécurisée.<br><br>
        Accès restreint aux membres autorisés de l’organisation.
    </div>

    <div class="status-box">
        <div class="status-line">
            <span>Authentication Service</span>
            <div class="dot"></div>
        </div>
        <div class="status-line">
            <span>Database Connection</span>
            <div class="dot"></div>
        </div>
        <div class="status-line">
            <span>Security Layer</span>
            <div class="dot"></div>
        </div>
    </div>

</div>

<!-- RIGHT PANEL -->
<div class="right">

    <div class="auth">

        <div class="auth-title">AUTHENTIFICATION</div>
        <div class="sub">Connexion au système interne</div>

        <div id="g_id_onload"
            data-client_id="280639681515-s3mthshvuqqc19s138j87o37br67qf9b.apps.googleusercontent.com"
            data-context="signin"
            data-ux_mode="popup"
            data-callback="handleCredentialResponse"
            data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
            data-type="standard"
            data-theme="outline"
            data-size="large">
        </div>

        <div id="status">En attente...</div>

    </div>

</div>

<script>
function handleCredentialResponse(response){

    const base64Url = response.credential.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');

    const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
        '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));

    const user = JSON.parse(jsonPayload);

    localStorage.setItem('lumy_user', JSON.stringify(user));

    document.getElementById("status").innerText =
        "Accès autorisé : " + user.email;

    setTimeout(()=>{
        window.location.href = "dashboard.html";
    },1000);
}
</script>

</body>
</html>
