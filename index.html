<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMY CORE | AUTHENTICATION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --cyan: #00f2ff;
            --purple: #b400ff;
            --bg: #050505;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Animation de fond */
        .bg-glow {
            position: absolute; width: 40vw; height: 40vw;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: -1; filter: blur(50px);
        }

        .auth-container {
            text-align: center;
            background: rgba(20, 20, 23, 0.8);
            padding: 60px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 400px; width: 90%;
        }

        .logo-area {
            font-family: 'Orbitron';
            font-size: 1.8rem;
            letter-spacing: 8px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-msg {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #555;
            margin-bottom: 40px;
        }

        .btn-google {
            background: white;
            color: #1d1d1f;
            border: none;
            padding: 16px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-google:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.2);
        }

        .btn-google img { width: 20px; }

        .footer-text {
            margin-top: 30px;
            font-size: 0.65rem;
            color: #444;
            letter-spacing: 1px;
        }

        /* Loader simple */
        #loader { display: none; margin-top: 20px; }
        .spinner {
            width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--cyan); border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="auth-container">
        <div class="logo-area">LUMY CORE</div>
        <div class="status-msg">Système de Liaison Unifié</div>

        <button class="btn-google" id="loginBtn" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Continuer avec Google
        </button>

        <div id="loader">
            <div class="spinner"></div>
            <p style="font-size: 0.7rem; color: var(--cyan); margin-top: 10px;">Vérification du protocole...</p>
        </div>

        <div class="footer-text">ACCÈS RÉSERVÉ AU PERSONNEL LUMY CORP.</div>
    </div>

    <script>
        // TA CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCjIUOQogsQUhRgYJgN1OlErEt3FsihZuo",
            authDomain: "lumy-corporation-1db3f.firebaseapp.com",
            databaseURL: "https://lumy-corporation-1db3f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lumy-corporation-1db3f",
            appId: "1:1023452628363:web:0806d0bc81436c0446db8e"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 1. GESTION DE LA CONNEXION
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            
            // Masquer le bouton, montrer le loader
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            auth.signInWithPopup(provider)
                .then((result) => {
                    // Succès ! La redirection se fera via onAuthStateChanged
                    console.log("Connecté en tant que :", result.user.displayName);
                })
                .catch((error) => {
                    console.error("Erreur d'authentification :", error);
                    alert("Échec de la connexion. Vérifiez vos droits d'accès.");
                    document.getElementById('loginBtn').style.display = 'flex';
                    document.getElementById('loader').style.display = 'none';
                });
        }

        // 2. SURVEILLANCE DE L'ÉTAT (SSO)
        auth.onAuthStateChanged(user => {
            if (user) {
                // Si l'utilisateur est déjà connecté, on l'envoie direct sur membres.html
                // On peut aussi restreindre ici par domaine :
                if (user.email.endsWith("@lumycorp.com") || user.email === "ton-email-admin@gmail.com") {
                    window.location.href = "membres.html";
                } else {
                    alert("Accès refusé : Ce portail est réservé aux membres @lumycorp.com");
                    auth.signOut();
                }
            }
        });
    </script>
</body>
</html>
