<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>LUMY CORE | Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #050505;
    --card: rgba(18,18,18,0.85);
    --text: #ffffff;
    --muted: #8b8b8b;
    --accent: #00f2ff;
    --danger: #ff3b3b;
}

/* Auto light mode */
@media (prefers-color-scheme: light) {
    :root {
        --bg: #f5f7fa;
        --card: rgba(255,255,255,0.85);
        --text: #0a0a0a;
        --muted: #666;
        --accent: #0077ff;
    }
}

body {
    margin:0;
    font-family: Inter, sans-serif;
    background: var(--bg);
    color: var(--text);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* glow background */
body::before {
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background: radial-gradient(circle, var(--accent), transparent 60%);
    filter: blur(120px);
    top:-200px;
    left:-200px;
    opacity:0.25;
}

.card {
    width: 420px;
    padding: 35px;
    border-radius: 25px;
    background: var(--card);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    text-align:center;
}

.logo {
    font-family: Orbitron;
    letter-spacing: 3px;
    color: var(--accent);
    font-size: 18px;
    margin-bottom:10px;
}

.title {
    font-size: 22px;
    font-weight:700;
    margin-bottom:10px;
}

.status {
    font-size: 14px;
    color: var(--muted);
    margin-bottom:25px;
}

.pulse {
    width:12px;
    height:12px;
    background: var(--accent);
    border-radius:50%;
    display:inline-block;
    margin-right:8px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity:1; }
    50% { transform: scale(1.8); opacity:0.4; }
    100% { transform: scale(1); opacity:1; }
}

.user {
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    background: rgba(0,0,0,0.25);
    text-align:left;
    font-size:13px;
}

.label {
    font-size:10px;
    color: var(--muted);
    text-transform:uppercase;
}

.btn {
    margin-top:25px;
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--danger);
    background:transparent;
    color:var(--danger);
    cursor:pointer;
    font-family: Orbitron;
    transition:0.2s;
}

.btn:hover {
    background: var(--danger);
    color:white;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">LUMY CORE</div>

    <div class="title">
        <span class="pulse"></span>
        Maintenance en cours
    </div>

    <div class="status">
        Les services sont temporairement indisponibles.<br>
        Mise à jour système en cours.
    </div>

    <div class="user" id="userBox">
        <div class="label">Utilisateur connecté</div>
        <div id="name">Chargement...</div>
        <div id="email" style="color:var(--accent);"></div>
    </div>

    <button class="btn" onclick="logout()">Déconnexion</button>

</div>

<script>
const user = JSON.parse(localStorage.getItem("lumy_user"));

if (user) {
    document.getElementById("name").innerText =
        (user.given_name || "") + " " + (user.family_name || user.name || "");

    document.getElementById("email").innerText = user.email || "";
} else {
    document.getElementById("name").innerText = "Non connecté";
}

function logout() {
    localStorage.removeItem("lumy_user");
    window.location.href = "index.html";
}
</script>

</body>
</html>
