<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMY CORE | INTRANET FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
display:flex;
background:#050505;
color:white;
font-family:Inter;
}

/* SIDEBAR */
.sidebar{
width:280px;
height:100vh;
background:#0a0a0a;
border-right:1px solid #1a1a1a;
padding:20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:30px;
}

.logo img{
width:40px;
height:40px;
border-radius:6px;
}

.logo span{
font-family:Orbitron;
color:#00f2ff;
}

.menu button{
width:100%;
padding:12px;
margin-bottom:10px;
background:#111;
border:1px solid #1f1f1f;
color:white;
text-align:left;
border-radius:8px;
cursor:pointer;
}

.menu button:hover{
border-color:#00f2ff;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.profile{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.profile img{
width:40px;
height:40px;
border-radius:50%;
border:1px solid #00f2ff;
}

/* CARD */
.card{
background:#0b0b0b;
border:1px solid #1a1a1a;
padding:20px;
border-radius:12px;
}

/* TITRE */
.title{
font-family:Orbitron;
color:#00f2ff;
margin-bottom:15px;
}

/* INPUTS */
input, select{
width:100%;
padding:10px;
margin-bottom:10px;
background:#111;
border:1px solid #1f1f1f;
color:white;
}

/* BTN */
.btn{
padding:10px;
background:#00f2ff;
border:none;
cursor:pointer;
margin-top:5px;
}

/* USER CARD */
.user{
padding:10px;
border-bottom:1px solid #1a1a1a;
cursor:pointer;
}

.user:hover{
background:#111;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
<img src="https://i.postimg.cc/ZCfjHWMY/logo.png">
<span>LUMY CORE</span>
</div>

<div class="menu">
<button onclick="loadDashboard()">Dashboard</button>
<button onclick="loadUsers()">Membres</button>
<button onclick="openCreateUser()">Créer membre</button>
<button onclick="loadProjects()">Projets</button>
<button onclick="loadChat()">Chat</button>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div id="welcome"></div>
<div class="profile" onclick="myProfile()">
<img id="pp">
</div>
</div>

<div class="card" id="content">Chargement...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
doc,
getDoc,
deleteDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"XXX",
authDomain:"XXX",
projectId:"XXX",
storageBucket:"XXX",
messagingSenderId:"XXX",
appId:"XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* USER */
const user = JSON.parse(localStorage.getItem("lumy_user"));

if(!user){
window.location.href="login.html";
}

document.getElementById("welcome").innerText =
"Salut " + user.given_name;

document.getElementById("pp").src = user.picture;

/* ROLE CHECK (simple front) */
function isAdmin(){
return user.email?.includes("@lumycorp.com");
}

/* DASHBOARD */
window.loadDashboard = function(){
document.getElementById("content").innerHTML =
"<div class='title'>DASHBOARD</div>Intranet opérationnel.";
}

/* USERS */
window.loadUsers = async function(){

const snap = await getDocs(collection(db,"users"));

let html = "<div class='title'>MEMBRES</div>";

snap.forEach(d=>{
const u = d.data();

html += `
<div class="user" onclick="viewUser('${d.id}')">
<b>${u.firstName} ${u.lastName}</b><br>
${u.email}<br>
<small>${u.role}</small>
</div>
`;
});

document.getElementById("content").innerHTML = html;
}

/* VIEW USER PROFILE */
window.viewUser = async function(id){

const ref = doc(db,"users",id);
const snap = await getDoc(ref);

const u = snap.data();

document.getElementById("content").innerHTML = `
<div class="title">PROFIL</div>

<b>${u.firstName} ${u.lastName}</b><br><br>
Email: ${u.email}<br>
Rôle: ${u.role}<br>
Téléphone: ${u.phone}<br>
Ville: ${u.city}<br>

${isAdmin() ? `<button class="btn" onclick="deleteUser('${id}')">Supprimer</button>` : ""}
`;
}

/* DELETE USER */
window.deleteUser = async function(id){
if(!isAdmin()) return;

await deleteDoc(doc(db,"users",id));
loadUsers();
}

/* CREATE USER */
window.openCreateUser = function(){

document.getElementById("content").innerHTML = `
<div class="title">CRÉER MEMBRE</div>

<input id="fn" placeholder="Prénom">
<input id="ln" placeholder="Nom">
<input id="email" placeholder="Email">
<input id="role" placeholder="Rôle">
<input id="phone" placeholder="Téléphone">
<input id="city" placeholder="Ville">

<button class="btn" onclick="createUser()">Créer</button>
`;
}

window.createUser = async function(){

await addDoc(collection(db,"users"),{
firstName:fn.value,
lastName:ln.value,
email:email.value,
role:role.value,
phone:phone.value,
city:city.value,
createdAt:Date.now()
});

loadUsers();
}

/* PROJECTS */
window.loadProjects = async function(){

const snap = await getDocs(collection(db,"projects"));

let html="<div class='title'>PROJETS</div>";

snap.forEach(d=>{
const p=d.data();
html+=`<div class="user">${p.name} - ${p.status}</div>`;
});

document.getElementById("content").innerHTML=html;
}

/* CHAT REALTIME */
window.loadChat = function(){

document.getElementById("content").innerHTML=`
<div class="title">CHAT</div>

<div id="chat"></div>

<input id="msg">
<button class="btn" onclick="send()">Envoyer</button>
`;

const q=query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,(snap)=>{
let box=document.getElementById("chat");
box.innerHTML="";

snap.forEach(d=>{
const m=d.data();
box.innerHTML+=`<div class="user"><b>${m.user}</b>: ${m.text}</div>`;
});
});
}

window.send = async function(){

await addDoc(collection(db,"messages"),{
user:user.given_name,
text:msg.value,
time:Date.now()
});

msg.value="";
}

/* PROFILE */
window.myProfile = function(){
alert(user.name + "\n" + user.email);
}

/* LOGOUT */
window.logout = function(){
localStorage.removeItem("lumy_user");
signOut(auth);
window.location.href="login.html";
}

</script>

</body>
</html>
