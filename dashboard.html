<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMY CORP - Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
:root{
    --bg:#05070c;
    --panel:#0b111b;
    --panel2:#0f1624;
    --text:#e7eefc;
    --muted:#7c8aa3;
    --accent:#00f2ff;
    --border:rgba(255,255,255,0.06);
}

@media (prefers-color-scheme: light){
:root{
    --bg:#f6f8fb;
    --panel:#ffffff;
    --panel2:#f3f6fb;
    --text:#0b1220;
    --muted:#5d6b82;
    --border:#e5ebf3;
}
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
    background:var(--bg);
    color:var(--text);
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:0;left:0;bottom:0;
    width:240px;
    background:var(--panel);
    border-right:1px solid var(--border);
    padding:20px;
    display:flex;
    flex-direction:column;
}

.brand{
    font-family:Orbitron;
    font-size:12px;
    letter-spacing:2px;
    color:var(--accent);
    margin-bottom:25px;
}

.nav button{
    width:100%;
    background:transparent;
    border:1px solid transparent;
    color:var(--text);
    text-align:left;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
}

.nav button:hover{
    background:var(--panel2);
    border-color:var(--border);
}

.bottom{
    margin-top:auto;
}

/* TOPBAR */
.topbar{
    position:fixed;
    left:240px;
    right:0;
    top:0;
    height:52px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 18px;
    background:var(--panel);
    border-bottom:1px solid var(--border);
}

.userbox{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    position:relative;
}

.userbox img{
    width:30px;
    height:30px;
    border-radius:50%;
    border:1px solid var(--accent);
}

/* DROPDOWN */
.dropdown{
    position:absolute;
    right:0;
    top:40px;
    background:var(--panel);
    border:1px solid var(--border);
    width:220px;
    padding:10px;
    display:none;
}

.dropdown div{
    font-size:12px;
    margin-bottom:6px;
    color:var(--muted);
}

.dropdown button{
    width:100%;
    margin-top:10px;
    padding:8px;
    background:transparent;
    border:1px solid var(--border);
    color:var(--text);
    cursor:pointer;
}

/* MAIN */
.main{
    margin-left:240px;
    padding:80px 20px;
}

.card{
    background:var(--panel);
    border:1px solid var(--border);
    padding:20px;
    border-radius:10px;
}

.chatbox{
    height:300px;
    overflow:auto;
    border:1px solid var(--border);
    padding:10px;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:var(--panel2);
    border:1px solid var(--border);
    color:var(--text);
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="brand">LUMY CORE</div>

    <div class="nav">
        <button onclick="show('dash')">Dashboard</button>
        <button onclick="show('members')">Members</button>
        <button onclick="show('projects')">Projects</button>
        <button onclick="show('chat')">Chat</button>
    </div>

    <div class="bottom">
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="topbar">
    <div style="font-size:12px;color:var(--muted)">Internal system</div>

    <div class="userbox" onclick="toggleDrop()">
        <img id="pp">
        <div id="name"></div>

        <div class="dropdown" id="drop">
            <div id="d_name"></div>
            <div id="d_email"></div>
            <button onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<div class="main">

    <div id="dash" class="card">
        <h2>Dashboard</h2>
        <p id="welcome"></p>
    </div>

    <div id="members" class="card" style="display:none;">
        <h3>Members</h3>
        <div id="usersList"></div>
    </div>

    <div id="projects" class="card" style="display:none;">
        <h3>Projects</h3>
        <p>No active projects</p>
    </div>

    <div id="chat" class="card" style="display:none;">
        <h3>Internal chat</h3>
        <div class="chatbox" id="chatbox"></div>
        <input id="msg" placeholder="message..." onkeydown="if(event.key==='Enter')send()">
    </div>

</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "XXX",
  authDomain: "XXX",
  projectId: "XXX",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// AUTH GUARD
auth.onAuthStateChanged(user=>{
    if(!user){
        location.href="index.html";
    } else {
        document.getElementById("name").innerText = user.displayName;
        document.getElementById("pp").src = user.photoURL;

        document.getElementById("d_name").innerText = user.displayName;
        document.getElementById("d_email").innerText = user.email;

        document.getElementById("welcome").innerText =
        "Welcome " + user.displayName;
    }
});

// NAV
function show(id){
    document.querySelectorAll(".main > div").forEach(e=>e.style.display="none");
    document.getElementById(id).style.display="block";
}

// DROPDOWN
function toggleDrop(){
    let d=document.getElementById("drop");
    d.style.display = d.style.display==="block"?"none":"block";
}

// LOGOUT
function logout(){
    auth.signOut().then(()=>location.href="index.html");
}

// CHAT REALTIME
function send(){
    let msg=document.getElementById("msg").value;
    db.collection("chat").add({
        text:msg,
        user:auth.currentUser.displayName,
        time:Date.now()
    });
    document.getElementById("msg").value="";
}

db.collection("chat").orderBy("time")
.onSnapshot(snap=>{
    let box=document.getElementById("chatbox");
    box.innerHTML="";
    snap.forEach(doc=>{
        let d=doc.data();
        box.innerHTML+=`<div><b>${d.user}</b> : ${d.text}</div>`;
    });
});
</script>

</body>
</html>
