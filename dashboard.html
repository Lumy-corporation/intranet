<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMY CORE | MAINTENANCE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050505;
--card:#0b0b0b;
--cyan:#00f2ff;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top, #0a0a0a, var(--bg));
color:white;
font-family:Inter;
overflow:hidden;
}

/* animation background grid */
.grid{
position:absolute;
width:200%;
height:200%;
background-image:
linear-gradient(#111 1px, transparent 1px),
linear-gradient(90deg, #111 1px, transparent 1px);
background-size:60px 60px;
transform:rotate(25deg);
opacity:0.25;
animation:move 20s linear infinite;
}

@keyframes move{
from{transform:translateY(0) rotate(25deg);}
to{transform:translateY(-200px) rotate(25deg);}
}

.container{
z-index:2;
text-align:center;
background:rgba(10,10,10,0.8);
border:1px solid #1a1a1a;
padding:50px;
border-radius:20px;
backdrop-filter: blur(10px);
width:420px;
box-shadow:0 0 60px rgba(0,242,255,0.05);
}

.logo{
font-family:Orbitron;
color:var(--cyan);
font-size:16px;
letter-spacing:3px;
margin-bottom:20px;
}

.title{
font-size:22px;
font-weight:600;
margin-bottom:10px;
}

.subtitle{
opacity:0.6;
font-size:13px;
margin-bottom:25px;
}

.loader{
width:60px;
height:60px;
border:3px solid #1a1a1a;
border-top:3px solid var(--cyan);
border-radius:50%;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.status{
font-size:12px;
opacity:0.7;
margin-top:15px;
}

.progress{
width:100%;
height:4px;
background:#111;
margin-top:20px;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:var(--cyan);
animation:load 5s ease-in-out infinite;
}

@keyframes load{
0%{width:0%}
50%{width:80%}
100%{width:100%}
}

.btn{
margin-top:25px;
padding:10px;
width:100%;
background:transparent;
border:1px solid var(--cyan);
color:var(--cyan);
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:var(--cyan);
color:black;
}

.footer{
position:absolute;
bottom:10px;
font-size:10px;
opacity:0.4;
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="container">

<div class="logo">LUMY CORE SYSTEM</div>

<div class="title">MAINTENANCE EN COURS</div>

<div class="subtitle">
L’intranet est temporairement indisponible<br>
Mise à jour système en cours
</div>

<div class="loader"></div>

<div class="progress">
<div class="bar"></div>
</div>

<div class="status" id="status">
Initialisation des services...
</div>

<button class="btn" onclick="logout()">Déconnexion</button>

</div>

<div class="footer">
Lumy Corporation • Secure Intranet Layer
</div>

<script>

const messages = [
"Initialisation des services...",
"Synchronisation Firestore...",
"Vérification des permissions...",
"Optimisation des modules internes...",
"Reconstruction du cache sécurisé...",
"Système prêt bientôt..."
];

let i = 0;

setInterval(()=>{
document.getElementById("status").innerText = messages[i];
i = (i+1) % messages.length;
},2000);

/* logout simple */
function logout(){
localStorage.removeItem("lumy_user");
window.location.href="login.html";
}

</script>

</body>
</html>
