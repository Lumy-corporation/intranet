<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMY CORE | Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:Inter;
    background:#050505;
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar {
    width:260px;
    background:#0b0b0b;
    border-right:1px solid #1a1a1a;
    height:100vh;
    padding:20px;
}

.logo {
    font-family:Orbitron;
    color:#00f2ff;
    margin-bottom:30px;
    letter-spacing:2px;
}

.menu button {
    width:100%;
    padding:12px;
    margin-bottom:10px;
    background:#111;
    border:1px solid #1f1f1f;
    color:white;
    cursor:pointer;
    border-radius:8px;
    text-align:left;
}

.menu button:hover {
    border-color:#00f2ff;
}

/* MAIN */
.main {
    flex:1;
    padding:30px;
}

.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.userbox {
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
}

.userbox img {
    width:35px;
    height:35px;
    border-radius:50%;
    border:1px solid #00f2ff;
}

.card {
    background:#0b0b0b;
    border:1px solid #1a1a1a;
    padding:20px;
    border-radius:12px;
}

.title {
    font-family:Orbitron;
    color:#00f2ff;
    margin-bottom:20px;
}

.user-item {
    padding:10px;
    border-bottom:1px solid #1a1a1a;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">LUMY CORE</div>

    <div class="menu">
        <button onclick="loadMembers()">Membres</button>
        <button onclick="loadProjects()">Projets</button>
        <button onclick="loadChat()">Chat</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <div id="welcome">Chargement...</div>

        <div class="userbox" onclick="toggleProfile()">
            <img id="pp" src="">
        </div>
    </div>

    <div class="card" id="content">
        Bienvenue sur l’intranet Lumy Core
    </div>

    <button onclick="logout()" style="margin-top:20px;background:#111;border:1px solid #ff4444;color:#ff4444;padding:10px;border-radius:8px;cursor:pointer;">
        Déconnexion
    </button>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "XXX",
  authDomain: "XXX",
  projectId: "XXX",
  storageBucket: "XXX",
  messagingSenderId: "XXX",
  appId: "XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* USER LOCAL */
const user = JSON.parse(localStorage.getItem("lumy_user"));

if(!user){
    window.location.href="login.html";
}

/* UI INIT */
document.getElementById("welcome").innerText =
"Salut " + user.given_name + " " + user.family_name;

document.getElementById("pp").src = user.picture;

/* MEMBERS */
window.loadMembers = async function(){

    const snap = await getDocs(collection(db,"users"));

    let html = "<div class='title'>MEMBRES</div>";

    snap.forEach(doc=>{
        const u = doc.data();

        html += `
            <div class="user-item">
                <b>${u.firstName || ""} ${u.lastName || ""}</b><br>
                <small>${u.email || ""}</small><br>
                <small>${u.role || "Member"}</small>
            </div>
        `;
    });

    document.getElementById("content").innerHTML = html;
}

/* PROJECTS (placeholder) */
window.loadProjects = function(){
    document.getElementById("content").innerHTML =
    "<div class='title'>PROJETS</div>Aucun projet disponible.";
}

/* CHAT (placeholder futur Firebase Realtime) */
window.loadChat = function(){
    document.getElementById("content").innerHTML =
    "<div class='title'>CHAT INTERNE</div>Module en cours de développement.";
}

/* PROFILE */
window.toggleProfile = function(){
    alert(
        "Nom: " + user.name +
        "\nEmail: " + user.email
    );
}

/* LOGOUT */
window.logout = function(){
    localStorage.removeItem("lumy_user");
    signOut(auth);
    window.location.href="login.html";
}

</script>

</body>
</html>
