<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMY CORP - Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#05070c;
    --panel:#0b111b;
    --text:#e7eefc;
    --muted:#7c8aa3;
    --accent:#00f2ff;
    --border:rgba(255,255,255,0.06);
}

@media (prefers-color-scheme: light){
:root{
    --bg:#f6f8fb;
    --panel:#ffffff;
    --text:#0b1220;
    --muted:#5d6b82;
    --border:#e5ebf3;
}
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter;
}

body{
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.container{
    background:var(--panel);
    border:1px solid var(--border);
    padding:50px;
    border-radius:12px;
    text-align:center;
    width:420px;
}

/* TITLE */
.brand{
    font-family:Orbitron;
    font-size:12px;
    letter-spacing:2px;
    color:var(--accent);
    margin-bottom:25px;
}

h1{
    font-size:16px;
    font-weight:500;
    margin-bottom:20px;
}

/* TEXT */
.desc{
    font-size:13px;
    color:var(--muted);
    line-height:1.6;
    margin-bottom:30px;
}

/* BUTTON */
button{
    background:transparent;
    border:1px solid var(--border);
    padding:10px 20px;
    color:var(--text);
    cursor:pointer;
    border-radius:8px;
    font-size:12px;
    transition:0.2s;
}

button:hover{
    border-color:var(--accent);
    color:var(--accent);
}
</style>
</head>

<body>

<div class="container">
    <div class="brand">LUMY CORE</div>

    <h1>Système temporairement indisponible</h1>

    <div class="desc">
        Une opération de maintenance est actuellement en cours.<br><br>
        Nos équipes procèdent à des améliorations afin de garantir un niveau optimal de performance et de sécurité.<br><br>
        L’accès sera rétabli prochainement.
    </div>

    <button onclick="logout()">Se déconnecter</button>
</div>

<script>
function logout(){
    localStorage.removeItem("lumy_user");
    window.location.href = "index.html";
}
</script>

</body>
</html>
