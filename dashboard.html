<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUMY CORE V2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjIUQOQS...",
  authDomain: "lumy-corporation-1db3f.firebaseapp.com",
  projectId: "lumy-corporation-1db3f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

/* NAVIGATION */
window.navigate = (page) => {
  document.querySelectorAll(".page").forEach(p => p.style.display="none");
  document.getElementById(page).style.display="block";
};

/* DASHBOARD */
async function loadDashboard() {
  const users = await getDocs(collection(db,"users"));
  const projects = await getDocs(collection(db,"projects"));
  const messages = await getDocs(collection(db,"messages"));
  const billing = await getDocs(collection(db,"billing"));

  document.getElementById("membersCount").innerText = users.size;
  document.getElementById("projectsCount").innerText = projects.size;
  document.getElementById("messagesCount").innerText = messages.size;

  let pending = 0;
  billing.forEach(d=>{
    if(d.data().status==="pending") pending++;
  });
  document.getElementById("pendingInvoices").innerText = pending;
}

/* CHAT */
window.sendMessage = async () => {
  const input = document.getElementById("chatInput");
  if(!input.value) return;

  await addDoc(collection(db,"messages"), {
    sender:"User",
    message:input.value,
    timestamp:new Date()
  });

  input.value="";
  loadMessages();
};

async function loadMessages(){
  const q = query(collection(db,"messages"), orderBy("timestamp","desc"), limit(20));
  const snap = await getDocs(q);

  const box = document.getElementById("chatBox");
  box.innerHTML="";

  snap.forEach(doc=>{
    const m = doc.data();
    box.innerHTML += `<div class="msg"><b>${m.sender}</b><br>${m.message}</div>`;
  });
}

/* USERS */
async function loadUsers(){
  const snap = await getDocs(collection(db,"users"));
  const list = document.getElementById("usersList");
  list.innerHTML="";

  snap.forEach(doc=>{
    const u = doc.data();
    list.innerHTML += `
      <div class="item">
        ${u.firstName} ${u.lastName} — ${u.role}
      </div>`;
  });
}

/* INIT */
window.onload = () => {
  navigate("dashboard");
  loadDashboard();
  loadMessages();
  loadUsers();
};

</script>

<style>
body{
  margin:0;
  background:#050505;
  color:white;
  font-family:'Inter';
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  width:260px;
  height:100vh;
  background:#0b0b0b;
  padding:20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  color:#00f2ff;
  font-family:'Orbitron';
  margin-bottom:30px;
}

.logo img{
  width:40px;
  filter:drop-shadow(0 0 10px #00f2ff);
}

.menu div{
  margin:12px 0;
  cursor:pointer;
  opacity:0.7;
}

.menu div:hover{
  color:#00f2ff;
  opacity:1;
}

/* MAIN */
.main{
  margin-left:260px;
  padding:30px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

.stat{
  text-align:center;
}

.stat p{
  font-size:28px;
  color:#00f2ff;
}

/* LIST */
.item{
  padding:10px;
  background:rgba(255,255,255,0.03);
  border-radius:10px;
  margin:10px 0;
}

/* CHAT */
.msg{
  margin:10px 0;
  padding:10px;
  background:rgba(255,255,255,0.03);
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#111;
  border:none;
  color:white;
}

button{
  margin-top:10px;
  padding:10px;
  background:#00f2ff;
  border:none;
  cursor:pointer;
}

/* PAGES */
.page{
  display:none;
}

</style>

</head>

<body>

<div class="sidebar">
  <div class="logo">
    <img src="https://i.postimg.cc/BbnFcJFS/Lumylogo.png">
    LUMY CORE
  </div>

  <div class="menu">
    <div onclick="navigate('dashboard')">Dashboard</div>
    <div onclick="navigate('users')">Membres</div>
    <div onclick="navigate('chat')">Chat</div>
  </div>
</div>

<div class="main">

  <!-- DASHBOARD -->
  <div id="dashboard" class="page">
    <h1>Dashboard</h1>

    <div class="grid">
      <div class="card stat"><h3>Membres</h3><p id="membersCount">0</p></div>
      <div class="card stat"><h3>Projets</h3><p id="projectsCount">0</p></div>
      <div class="card stat"><h3>Messages</h3><p id="messagesCount">0</p></div>
      <div class="card stat"><h3>Factures</h3><p id="pendingInvoices">0</p></div>
    </div>
  </div>

  <!-- USERS -->
  <div id="users" class="page">
    <h1>Membres</h1>
    <div id="usersList"></div>
  </div>

  <!-- CHAT -->
  <div id="chat" class="page">
    <h1>Chat interne</h1>
    <div id="chatBox"></div>
    <input id="chatInput" placeholder="Message...">
    <button onclick="sendMessage()">Envoyer</button>
  </div>

</div>

</body>
</html>
