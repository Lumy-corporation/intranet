<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white p-6">

<!-- HEADER -->
<div class="flex justify-between items-start mb-6">
  <div>
    <h1 class="text-2xl font-bold">
      Bienvenue, <span id="name" class="text-cyan-400"></span> 👋
    </h1>
    <p id="date" class="text-gray-400 text-sm"></p>
  </div>

  <div id="role" class="px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-cyan-400 text-xs"></div>
</div>

<!-- STATS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">

  <div class="bg-gray-900 p-4 rounded-xl">
    <p class="text-gray-400 text-xs">Membres</p>
    <p id="members" class="text-2xl font-bold"></p>
  </div>

  <div class="bg-gray-900 p-4 rounded-xl">
    <p class="text-gray-400 text-xs">Projets actifs</p>
    <p id="projects" class="text-2xl font-bold"></p>
  </div>

  <div class="bg-gray-900 p-4 rounded-xl">
    <p class="text-gray-400 text-xs">Factures en attente</p>
    <p id="pending" class="text-2xl font-bold text-amber-400"></p>
  </div>

  <div class="bg-gray-900 p-4 rounded-xl">
    <p class="text-gray-400 text-xs">Encaissé</p>
    <p id="paid" class="text-2xl font-bold text-emerald-400"></p>
  </div>

</div>

<!-- GRID -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

  <!-- LOGS -->
  <div class="lg:col-span-2 bg-gray-900 rounded-xl p-4">
    <h2 class="font-semibold mb-3">Activité système</h2>
    <div id="logs" class="space-y-2"></div>
  </div>

  <!-- RIGHT -->
  <div class="space-y-4">

    <!-- MESSAGES -->
    <div class="bg-gray-900 rounded-xl p-4">
      <h2 class="font-semibold mb-3">Messages récents</h2>
      <div id="messages" class="space-y-2"></div>
    </div>

    <!-- INVOICES -->
    <div class="bg-gray-900 rounded-xl p-4">
      <h2 class="font-semibold mb-3">Facturation</h2>
      <div id="invoiceStatus" class="space-y-2"></div>
    </div>

  </div>
</div>

<script>
/* ---------------- MOCK DATA ---------------- */

const user = {
  full_name: "Alex Martin",
  role: "ADMIN"
};

const members = Array(12).fill({});
const projects = [
  { status: "active" },
  { status: "active" },
  { status: "done" }
];

const invoices = [
  { status: "pending", amount: 120 },
  { status: "paid", amount: 200 },
  { status: "paid", amount: 350 },
  { status: "failed", amount: 80 }
];

const messages = [
  { senderName: "Lina", content: "Salut 👋" },
  { senderName: "Tom", content: "Projet prêt" },
  { senderName: "Sara", content: "Bug fixé" }
];

const logs = [
  { action: "Login", category: "auth", severity: "info", created_date: new Date() },
  { action: "Invoice created", category: "invoice", severity: "warning", created_date: new Date() }
];

/* ---------------- HEADER ---------------- */

document.getElementById("name").innerText = user.full_name.split(" ")[0];
document.getElementById("role").innerText = user.role;

/* DATE */
document.getElementById("date").innerText =
  new Date().toLocaleDateString("fr-FR", {
    weekday: "long",
    year: "numeric",
    month: "long",
    day: "numeric"
  });

/* ---------------- STATS ---------------- */

document.getElementById("members").innerText = members.length;

document.getElementById("projects").innerText =
  projects.filter(p => p.status === "active").length;

document.getElementById("pending").innerText =
  invoices.filter(i => i.status === "pending").length;

document.getElementById("paid").innerText =
  invoices
    .filter(i => i.status === "paid")
    .reduce((a, b) => a + b.amount, 0) + "€";

/* ---------------- LOGS ---------------- */

const logsBox = document.getElementById("logs");

logs.forEach(l => {
  const div = document.createElement("div");
  div.className = "p-2 bg-gray-800 rounded text-sm";
  div.innerHTML = `
    <b>${l.action}</b>
    <div class="text-gray-400 text-xs">${l.category}</div>
  `;
  logsBox.appendChild(div);
});

/* ---------------- MESSAGES ---------------- */

const msgBox = document.getElementById("messages");

messages.forEach(m => {
  const div = document.createElement("div");
  div.className = "flex gap-2 p-2 bg-gray-800 rounded";

  div.innerHTML = `
    <div class="w-6 h-6 bg-purple-500/20 rounded-full flex items-center justify-center text-xs">
      ${m.senderName[0]}
    </div>
    <div>
      <div class="text-sm">${m.senderName}</div>
      <div class="text-xs text-gray-400">${m.content}</div>
    </div>
  `;

  msgBox.appendChild(div);
});

/* ---------------- INVOICE STATUS ---------------- */

const invBox = document.getElementById("invoiceStatus");

const status = [
  { label: "Payées", key: "paid", color: "text-emerald-400" },
  { label: "En attente", key: "pending", color: "text-amber-400" },
  { label: "Échouées", key: "failed", color: "text-red-400" }
];

status.forEach(s => {
  const count = invoices.filter(i => i.status === s.key).length;

  const div = document.createElement("div");
  div.className = "flex justify-between text-sm";

  div.innerHTML = `
    <span class="${s.color}">${s.label}</span>
    <span class="${s.color} font-bold">${count}</span>
  `;

  invBox.appendChild(div);
});
</script>

</body>
</html>
