<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD | LUMY CORP SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ffffff;
            --accent: #007bff;
            --bg: #000000;
            --card-bg: rgba(15, 15, 15, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- NAVIGATION BAR --- */
        nav {
            height: 80px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
        }

        .nav-logo {
            font-family: 'Orbitron';
            letter-spacing: 4px;
            font-size: 1.2rem;
            color: #fff;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px 5px 5px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        #user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #user-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #eee;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            padding-left: 10px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .logout-btn:hover { color: #ff8888; }

        /* --- MAIN CONTENT --- */
        main {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-section {
            margin-bottom: 50px;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff00;
        }

        .status-text {
            color: #00ff00;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        h2 { 
            font-family: 'Orbitron'; 
            font-size: 2rem; 
            margin-top: 15px;
            letter-spacing: -1px;
        }

        /* --- GRID --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-8px);
            background: rgba(20, 20, 20, 0.95);
        }

        .card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 20px;
        }

        .card-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            font-family: 'Orbitron';
        }

        .card-subtext {
            color: #444;
            font-size: 0.8rem;
        }

        .action-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .action-link:hover { text-decoration: underline; }

    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">LUMY CORE</div>
        
        <div class="user-profile">
            <img id="user-avatar" src="https://via.placeholder.com/35" alt="Avatar">
            <span id="user-name">Agent</span>
            <button class="logout-btn" onclick="logout()">Quitter</button>
        </div>
    </nav>

    <main>
        <section class="header-section">
            <div>
                <span class="status-dot"></span>
                <span class="status-text">Système LumyCorp actif</span>
            </div>
            <h2 id="welcome-title">BIENVENUE</h2>
        </section>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Unités Connectées</h3>
                <div class="card-value">12</div>
                <div class="card-subtext">Tous les membres @lumycorp.com</div>
                <a href="#" class="action-link">Voir l'annuaire →</a>
            </div>

            <div class="card">
                <h3>Base de Données</h3>
                <div class="card-value">4.2 TB</div>
                <div class="card-subtext">Stockage Cloud Lumy sécurisé</div>
                <a href="#" class="action-link">Accéder aux fichiers →</a>
            </div>

            <div class="card">
                <h3>Niveau d'Accès</h3>
                <div class="card-value" style="color: #007bff;">ADM</div>
                <div class="card-subtext">Autorisation de niveau 5</div>
                <a href="#" class="action-link">Paramètres sécurité →</a>
            </div>
        </div>
    </main>

    <script>
        window.onload = function() {
            // On récupère les données envoyées par Google depuis le localStorage
            const name = localStorage.getItem('userName');
            const pic = localStorage.getItem('userPic');
            const email = localStorage.getItem('userEmail');

            if (name) {
                document.getElementById('user-name').innerText = name.split(' ')[0]; // Affiche juste le prénom
                document.getElementById('welcome-title').innerText = "BIENVENUE, " + name.toUpperCase();
            }

            if (pic) {
                document.getElementById('user-avatar').src = pic;
            }

            // Sécurité : Si pas d'email, on redirige vers le login
            if (!email) {
                window.location.href = "index.html";
            }
        };

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
