<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD | LUMY CORP SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ffffff;
            --accent: #007bff;
            --bg: #000000;
            --card-bg: rgba(15, 15, 15, 0.9);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Barre de Navigation */
        nav {
            height: 70px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Orbitron';
            letter-spacing: 3px;
            font-size: 1.2rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            background: none;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #ff4444;
            color: white;
        }

        /* Contenu Principal */
        main {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .welcome-section {
            margin-bottom: 40px;
        }

        h2 { font-family: 'Orbitron'; margin-bottom: 10px; }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
            border-radius: 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            border: 1px solid #00ff00;
        }

        /* Grille de Widgets */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
        }

        .card h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: #888;
        }

        .stats { font-size: 2rem; font-weight: 600; margin-bottom: 10px; }

        .btn-action {
            display: block;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: black;
            text-align: center;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">LUMY CORE</div>
        <div class="user-info">
            <span id="user-email" style="color: #888; font-size: 0.9rem;">Chargement...</span>
            <button class="logout-btn" onclick="logout()">DÉCONNEXION</button>
        </div>
    </nav>

    <main>
        <section class="welcome-section">
            <div class="status-badge">Système Opérationnel</div>
            <h2 style="margin-top: 15px;">BIENVENUE, AGENT</h2>
            <p style="color: #666;">Accès autorisé au terminal de gestion Lumy Corporation.</p>
        </section>

        <div class="grid">
            <div class="card">
                <h3>Utilisateurs Actifs</h3>
                <div class="stats">12</div>
                <p style="color: #444; font-size: 0.8rem;">+2 depuis la dernière session</p>
                <a href="#" class="btn-action">Gérer l'équipe</a>
            </div>

            <div class="card">
                <h3>Serveurs Cloud</h3>
                <div class="stats">99.9%</div>
                <p style="color: #444; font-size: 0.8rem;">Latence : 14ms</p>
                <a href="#" class="btn-action">Logs Système</a>
            </div>

            <div class="card">
                <h3>Sécurité</h3>
                <div class="stats">ON</div>
                <p style="color: #444; font-size: 0.8rem;">Pare-feu actif</p>
                <a href="#" class="btn-action">Vérifier</a>
            </div>
        </div>
    </main>

    <script>
        // Vérification de la session (si tu utilises Firebase ou juste un test local)
        // Pour l'instant, on simule l'affichage de l'utilisateur
        window.onload = function() {
            const userEmail = localStorage.getItem('userEmail') || "theo.rabillard@lumycorp.com";
            document.getElementById('user-email').innerText = userEmail;
        }

        function logout() {
            // Logique de déconnexion
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
