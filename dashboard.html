<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LUMY CORE | INTRANET</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
display:flex;
background:#050505;
color:white;
font-family:Inter;
}

/* SIDEBAR */
.sidebar{
width:280px;
height:100vh;
background:#0a0a0a;
border-right:1px solid #1a1a1a;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-family:Orbitron;
color:#00f2ff;
margin-bottom:25px;
font-size:14px;
letter-spacing:2px;
}

.menu button{
width:100%;
padding:12px;
margin-bottom:10px;
background:#111;
border:1px solid #1a1a1a;
color:white;
cursor:pointer;
text-align:left;
border-radius:8px;
transition:0.2s;
}

.menu button:hover{
border-color:#00f2ff;
transform:translateX(3px);
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.profile{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.profile img{
width:42px;
height:42px;
border-radius:50%;
border:1px solid #00f2ff;
}

/* CONTENT */
.card{
background:#0b0b0b;
border:1px solid #1a1a1a;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.title{
font-family:Orbitron;
color:#00f2ff;
margin-bottom:15px;
}

/* INPUT */
input{
width:100%;
padding:10px;
margin-top:10px;
background:#111;
border:1px solid #1a1a1a;
color:white;
}

/* BUTTON */
.btn{
padding:10px;
background:#00f2ff;
border:none;
cursor:pointer;
margin-top:10px;
width:100%;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">LUMY CORE INTRANET</div>

<div class="menu">
<button onclick="load('dashboard')">Dashboard</button>
<button onclick="load('members')">Membres</button>
<button onclick="load('chat')">Chat interne</button>
<button onclick="logout()">Déconnexion</button>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div id="welcome">Chargement...</div>
<div class="profile">
<img id="pp">
</div>
</div>

<div id="content" class="card">Initialisation...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
apiKey:"XXX",
authDomain:"XXX",
projectId:"XXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

/* AUTH PROTECTION */
onAuthStateChanged(auth,(u)=>{

if(!u){
window.location.href="login.html";
return;
}

user = u;

document.getElementById("welcome").innerText =
"Bienvenue " + u.displayName;

document.getElementById("pp").src = u.photoURL;

load("dashboard");
});

/* ROUTER */
window.load = async function(page){

if(page==="dashboard"){
document.getElementById("content").innerHTML=`
<div class="title">DASHBOARD</div>
Système intranet actif. Connexion sécurisée Firebase.
`;
}

/* MEMBERS */
if(page==="members"){

const snap = await getDocs(collection(db,"users"));

let html="<div class='title'>MEMBRES</div>";

snap.forEach(d=>{
const u=d.data();

html+=`
<div class="card">
<b>${u.firstName} ${u.lastName}</b><br>
${u.email}<br>
<small>${u.role}</small>
</div>
`;
});

document.getElementById("content").innerHTML=html;
}

/* CHAT */
if(page==="chat"){

document.getElementById("content").innerHTML=`
<div class="title">CHAT INTERNE</div>

<div id="chat"></div>

<input id="msg">
<button class="btn" onclick="send()">Envoyer</button>
`;

const q=query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,(snap)=>{

let box=document.getElementById("chat");
box.innerHTML="";

snap.forEach(d=>{
const m=d.data();
box.innerHTML+=`
<div class="card"><b>${m.user}</b><br>${m.text}</div>
`;
});

});
}
}

/* SEND MESSAGE */
window.send = async function(){

await addDoc(collection(db,"messages"),{
user:user.displayName,
text:msg.value,
time:Date.now()
});

msg.value="";
}

/* LOGOUT */
window.logout = async function(){
await signOut(auth);
window.location.href="login.html";
}

</script>

</body>
</html>
