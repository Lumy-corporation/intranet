<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMY CORE | INTRANET V5</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
display:flex;
background:#050505;
color:white;
font-family:Inter;
}

/* SIDEBAR */
.sidebar{
width:290px;
height:100vh;
background:#0a0a0a;
border-right:1px solid #1a1a1a;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
align-items:center;
gap:12px;
margin-bottom:30px;
}

.logo img{
width:42px;
height:42px;
border-radius:8px;
}

.logo span{
font-family:Orbitron;
color:#00f2ff;
letter-spacing:2px;
font-size:14px;
}

.menu button{
width:100%;
padding:12px;
margin-bottom:10px;
background:#111;
border:1px solid #1f1f1f;
color:white;
text-align:left;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.menu button:hover{
border-color:#00f2ff;
transform:translateX(3px);
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.user{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.user img{
width:40px;
height:40px;
border-radius:50%;
border:1px solid #00f2ff;
}

/* CARD SYSTEM */
.card{
background:#0b0b0b;
border:1px solid #1a1a1a;
padding:20px;
border-radius:12px;
margin-bottom:10px;
}

.title{
font-family:Orbitron;
color:#00f2ff;
margin-bottom:15px;
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin-bottom:10px;
background:#111;
border:1px solid #1f1f1f;
color:white;
}

/* BUTTON */
.btn{
padding:10px;
background:#00f2ff;
border:none;
cursor:pointer;
margin-top:5px;
}

/* LIST */
.item{
padding:10px;
border-bottom:1px solid #1a1a1a;
cursor:pointer;
}

.item:hover{
background:#111;
}

/* CHAT */
.chat{
height:350px;
overflow:auto;
border:1px solid #1a1a1a;
padding:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
<img src="https://i.postimg.cc/ZCfjHWMY/logo.png">
<span>LUMY CORE</span>
</div>

<div class="menu">
<button onclick="view('dashboard')">Dashboard</button>
<button onclick="view('members')">Membres</button>
<button onclick="view('create')">Créer membre</button>
<button onclick="view('projects')">Projets</button>
<button onclick="view('chat')">Chat</button>
<button onclick="view('logs')">Logs</button>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<div id="welcome">Chargement...</div>
<div class="user" onclick="profile()">
<img id="pp">
</div>
</div>

<div class="card" id="content">Chargement...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
doc,
getDoc,
deleteDoc,
onSnapshot,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey:"XXX",
authDomain:"XXX",
projectId:"XXX",
storageBucket:"XXX",
messagingSenderId:"XXX",
appId:"XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* USER */
const user = JSON.parse(localStorage.getItem("lumy_user"));

if(!user){
window.location.href="login.html";
}

document.getElementById("welcome").innerText =
"Bienvenue " + user.given_name;

document.getElementById("pp").src = user.picture;

/* ROLE SIMPLE */
const isAdmin = user.email?.includes("@lumycorp.com");

/* ROUTER */
window.view = function(page){

if(page==="dashboard"){
document.getElementById("content").innerHTML =
"<div class='title'>DASHBOARD</div>Système Lumy opérationnel.";
}

/* MEMBERS */
if(page==="members"){
loadMembers();
}

/* CREATE */
if(page==="create"){
createForm();
}

/* PROJECTS */
if(page==="projects"){
loadProjects();
}

/* CHAT */
if(page==="chat"){
loadChat();
}

/* LOGS */
if(page==="logs"){
loadLogs();
}
}

/* MEMBERS */
async function loadMembers(){

const snap = await getDocs(collection(db,"users"));

let html="<div class='title'>MEMBRES</div>";

snap.forEach(d=>{
const u=d.data();

html+=`
<div class="item" onclick="openUser('${d.id}')">
<b>${u.firstName} ${u.lastName}</b><br>
${u.email}<br>
<small>${u.role}</small>
</div>
`;
});

document.getElementById("content").innerHTML=html;
}

/* USER PROFILE */
window.openUser = async function(id){

const snap = await getDoc(doc(db,"users",id));
const u=snap.data();

document.getElementById("content").innerHTML=`
<div class="title">PROFIL</div>

<b>${u.firstName} ${u.lastName}</b><br><br>
Email: ${u.email}<br>
Role: ${u.role}<br>
Ville: ${u.city}<br>
Téléphone: ${u.phone}<br>

${isAdmin ? `<button class="btn" onclick="deleteUser('${id}')">Supprimer</button>` : ""}
`;
}

/* DELETE */
window.deleteUser = async function(id){
if(!isAdmin) return;
await deleteDoc(doc(db,"users",id));
view("members");
}

/* CREATE FORM */
function createForm(){
document.getElementById("content").innerHTML=`
<div class="title">CRÉER MEMBRE</div>

<input id="fn" placeholder="Prénom">
<input id="ln" placeholder="Nom">
<input id="email" placeholder="Email">
<input id="role" placeholder="Rôle">
<input id="phone" placeholder="Téléphone">
<input id="city" placeholder="Ville">

<button class="btn" onclick="createUser()">Créer</button>
`;
}

/* CREATE USER */
window.createUser = async function(){

await addDoc(collection(db,"users"),{
firstName:fn.value,
lastName:ln.value,
email:email.value,
role:role.value,
phone:phone.value,
city:city.value,
createdAt:Date.now()
});

view("members");
}

/* PROJECTS */
async function loadProjects(){

const snap=await getDocs(collection(db,"projects"));

let html="<div class='title'>PROJETS</div>";

snap.forEach(d=>{
const p=d.data();

html+=`<div class="item">${p.name} - ${p.status}</div>`;
});

document.getElementById("content").innerHTML=html;
}

/* CHAT */
function loadChat(){

document.getElementById("content").innerHTML=`
<div class="title">CHAT</div>

<div class="chat" id="chat"></div>

<input id="msg">
<button class="btn" onclick="send()">Envoyer</button>
`;

const q=query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,(snap)=>{
let box=document.getElementById("chat");
box.innerHTML="";

snap.forEach(d=>{
const m=d.data();
box.innerHTML+=`<div class="item"><b>${m.user}</b>: ${m.text}</div>`;
});
});
}

/* SEND MSG */
window.send = async function(){
await addDoc(collection(db,"messages"),{
user:user.given_name,
text:msg.value,
time:Date.now()
});

msg.value="";
}

/* LOGS */
async function loadLogs(){
document.getElementById("content").innerHTML=
"<div class='title'>LOGS SYSTÈME</div>Module prêt backend.";
}

/* PROFILE */
window.profile = function(){
alert(user.name + "\n" + user.email);
}

/* INIT */
view("dashboard");

</script>

</body>
</html>
