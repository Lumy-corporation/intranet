<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUMY CORP Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjIUQOQS...",
  authDomain: "lumy-corporation-1db3f.firebaseapp.com",
  databaseURL: "https://lumy-corporation-1db3f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lumy-corporation-1db3f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

/* LOAD DASHBOARD */
async function loadDashboard() {

  // MEMBERS
  const usersSnap = await getDocs(collection(db, "users"));
  document.getElementById("membersCount").innerText = usersSnap.size;

  // PROJECTS
  const projectsSnap = await getDocs(collection(db, "projects"));
  document.getElementById("projectsCount").innerText = projectsSnap.size;

  // MESSAGES
  const messagesSnap = await getDocs(collection(db, "messages"));
  document.getElementById("messagesCount").innerText = messagesSnap.size;

  // BILLING
  const billingSnap = await getDocs(collection(db, "billing"));
  let pending = 0;
  billingSnap.forEach(doc => {
    if (doc.data().status === "pending") pending++;
  });
  document.getElementById("pendingInvoices").innerText = pending;

  // LOGS (latest 10)
  const logsQuery = query(collection(db, "logs"), orderBy("timestamp", "desc"), limit(10));
  const logsSnap = await getDocs(logsQuery);

  const logsContainer = document.getElementById("logsContainer");
  logsContainer.innerHTML = "";

  logsSnap.forEach(doc => {
    const log = doc.data();
    logsContainer.innerHTML += `
      <div>📌 ${log.action || "activité"}<br>
      <small>${formatDate(log.timestamp)}</small></div>
    `;
  });

  // RECENT MESSAGES (latest 10)
  const msgQuery = query(collection(db, "messages"), orderBy("timestamp", "desc"), limit(10));
  const msgSnap = await getDocs(msgQuery);

  const recentMessages = document.getElementById("recentMessages");
  recentMessages.innerHTML = "";

  msgSnap.forEach(doc => {
    const m = doc.data();
    recentMessages.innerHTML += `
      <div>💬 <b>${m.sender || "User"}</b><br>${m.message}</div>
    `;
  });
}

function formatDate(ts) {
  if (!ts) return "";
  return new Date(ts.seconds * 1000).toLocaleString();
}

window.onload = loadDashboard;

</script>

<style>
body {
  margin:0;
  font-family:'Inter';
  background:#050505;
  color:white;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  width:260px;
  height:100vh;
  background:#0b0b0b;
  padding:20px;
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
  font-family:'Orbitron';
  color:#00f2ff;
  margin-bottom:30px;
}

.logo img {
  width:40px;
  filter:drop-shadow(0 0 10px #00f2ff);
}

.menu div {
  margin:15px 0;
  cursor:pointer;
  opacity:0.7;
  transition:0.3s;
}

.menu div:hover {
  opacity:1;
  color:#00f2ff;
}

/* MAIN */
.main {
  margin-left:260px;
  padding:30px;
}

h1 {
  margin-bottom:20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:20px;
  margin-bottom:20px;
}

.grid-2 {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:20px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(12px);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-4px);
  box-shadow:0 0 25px #00f2ff22;
}

/* STATS */
.stat {
  text-align:center;
}

.stat p {
  font-size:30px;
  color:#00f2ff;
}

/* LIST */
#logsContainer div,
#recentMessages div {
  margin:10px 0;
  padding:10px;
  background:rgba(255,255,255,0.03);
  border-radius:10px;
  font-size:14px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <img src="https://i.postimg.cc/BbnFcJFS/Lumylogo.png">
    LUMY CORE
  </div>

  <div class="menu">
    <div>Dashboard</div>
    <div>Membres</div>
    <div>Recrutement</div>
    <div>Projets</div>
    <div>Chat</div>
    <div>Facturation</div>
    <div>Logs</div>
    <div>Paramètres</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <h1>Dashboard</h1>

  <!-- STATS -->
  <div class="grid">

    <div class="card stat">
      <h3>Membres</h3>
      <p id="membersCount">0</p>
    </div>

    <div class="card stat">
      <h3>Projets</h3>
      <p id="projectsCount">0</p>
    </div>

    <div class="card stat">
      <h3>Messages</h3>
      <p id="messagesCount">0</p>
    </div>

    <div class="card stat">
      <h3>Factures en attente</h3>
      <p id="pendingInvoices">0</p>
    </div>

  </div>

  <!-- CONTENT -->
  <div class="grid-2">

    <div class="card">
      <h3>Activité système</h3>
      <div id="logsContainer"></div>
    </div>

    <div class="card">
      <h3>Messages récents</h3>
      <div id="recentMessages"></div>
    </div>

  </div>

</div>

</body>
</html>
