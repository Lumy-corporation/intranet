<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DASHBOARD | LUMY CORE</title>
    <link rel="stylesheet" href="css/style.css"> <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="background: #0a0a14; color: white; font-family: sans-serif;">

    <nav style="padding: 20px; border-bottom: 1px solid #00d4ff; display: flex; justify-content: space-between;">
        <span id="user-welcome" style="font-weight: bold; color: #00d4ff;">ACCÈS CORE...</span>
        <button onclick="logout()" style="background: red; color: white; border: none; padding: 5px 10px; cursor: pointer;">DÉCONNEXION</button>
    </nav>

    <div style="padding: 30px;">
        <h2>CANDIDATURES EN ATTENTE</h2>
        
        <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid #333;">
                    <th>Nom / Prénom</th>
                    <th>Pôle</th>
                    <th>Email</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="candidates-list">
                </tbody>
        </table>
    </div>

    <script>
        // Initialise Firebase (même config que la page login)
        // ... (Config Firebase ici) ...
        const db = firebase.firestore();

        // Sécurité : Vérifier si l'utilisateur est connecté
        const user = JSON.parse(localStorage.getItem('lumy_user'));
        if(!user) window.location.href = "index.html";
        document.getElementById('user-welcome').innerText = "OPÉRATEUR : " + user.name.toUpperCase();

        // Charger les candidats en temps réel
        db.collection("candidates").onSnapshot((snapshot) => {
            const list = document.getElementById('candidates-list');
            list.innerHTML = ""; // Vide la liste avant de recharger
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                list.innerHTML += `
                    <tr style="border-bottom: 1px solid #222; height: 50px;">
                        <td>${data.nom} ${data.prenom}</td>
                        <td><span style="color: #00d4ff;">${data.pole}</span></td>
                        <td>${data.email_prive}</td>
                        <td>${data.statut}</td>
                        <td>
                            <button onclick="valider('${doc.id}')" style="background: green; color: white; border: none; padding: 5px;">VALIDER</button>
                        </td>
                    </tr>
                `;
            });
        });

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
