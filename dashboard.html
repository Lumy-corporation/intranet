<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMY CORE | DASHBOARD</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050505;
    --card:#111;
    --cyan:#00f2ff;
}

body{
    margin:0;
    font-family:Inter;
    background:var(--bg);
    color:white;
}

/* ===== TOP BAR ===== */
.topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:60px;
    background:#0d0d0d;
    border-bottom:1px solid #222;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    z-index:1000;
}

.menu{
    display:flex;
    gap:20px;
}

.menu a{
    color:#aaa;
    text-decoration:none;
    font-size:13px;
}

.menu a:hover{
    color:var(--cyan);
}

/* PROFILE */
.profile{
    position:relative;
    cursor:pointer;
}

.profile img{
    width:35px;
    height:35px;
    border-radius:50%;
    border:2px solid var(--cyan);
}

/* DROPDOWN */
.dropdown{
    position:absolute;
    right:0;
    top:50px;
    background:#111;
    border:1px solid #222;
    width:220px;
    border-radius:10px;
    display:none;
    padding:10px;
}

.dropdown p{
    margin:5px 0;
    font-size:12px;
    color:#ccc;
}

.logout{
    margin-top:10px;
    padding:8px;
    text-align:center;
    border:1px solid red;
    color:red;
    cursor:pointer;
    border-radius:6px;
}

/* DASHBOARD */
.container{
    padding-top:100px;
    text-align:center;
}

h1{
    font-family:Orbitron;
    color:var(--cyan);
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Membres</a>
        <a href="#">Apps</a>
    </div>

    <div class="profile" onclick="toggleMenu()">
        <img id="pp" src="">
        
        <div class="dropdown" id="dropdown">

            <p id="name">Nom</p>
            <p id="email">Email</p>

            <div class="logout" onclick="logout()">Déconnexion</div>

        </div>
    </div>

</div>

<!-- DASHBOARD -->
<div class="container">
    <h1 id="hello">Chargement...</h1>
</div>

<script>
let user = JSON.parse(localStorage.getItem("lumy_user"));

if(!user){
    window.location.href="index.html";
}

/* ===== AFFICHAGE ===== */

document.getElementById("pp").src = user.photo || "https://via.placeholder.com/100";

document.getElementById("name").innerText = user.name || "Inconnu";
document.getElementById("email").innerText = user.email || "-";

/* prénom + nom (safe split) */
let split = (user.name || "").split(" ");

let prenom = split[0] || "";
let nom = split.slice(1).join(" ") || "";

document.getElementById("hello").innerText =
"Salut " + prenom + " " + nom;

/* MENU */
function toggleMenu(){
    let d = document.getElementById("dropdown");
    d.style.display = (d.style.display === "block") ? "none" : "block";
}

/* logout */
function logout(){
    localStorage.removeItem("lumy_user");
    window.location.href="index.html";
}
</script>

</body>
</html>
