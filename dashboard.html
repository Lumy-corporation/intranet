<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMY CORE | MAINTENANCE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050505;
    --cyan:#00f2ff;
    --red:#ff3b3b;
    --gray:#888;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg);
    color:white;
    font-family:Inter;
}

.box{
    text-align:center;
    max-width:500px;
    padding:40px;
}

h1{
    font-family:Orbitron;
    color:var(--cyan);
    letter-spacing:3px;
    font-size:26px;
}

.loader{
    margin:20px auto;
    display:flex;
    justify-content:center;
    gap:6px;
}

.dot{
    width:8px;
    height:8px;
    background:var(--cyan);
    border-radius:50%;
    animation:blink 1.2s infinite ease-in-out;
}

.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

.status{
    margin-top:20px;
    color:var(--gray);
    font-size:14px;
    line-height:1.6;
}

.alert{
    margin-top:25px;
    color:var(--red);
    font-weight:700;
    letter-spacing:1px;
}

.user{
    margin-top:15px;
    color:white;
    font-size:16px;
}

/* BTN DECO */
.logout{
    margin-top:35px;
    padding:10px 18px;
    border:1px solid var(--red);
    background:none;
    color:var(--red);
    cursor:pointer;
    border-radius:8px;
    font-family:Orbitron;
    font-size:12px;
    transition:0.3s;
}

.logout:hover{
    background:var(--red);
    color:white;
}
</style>
</head>

<body>

<div class="box">

    <h1>LUMY CORE SYSTEM</h1>

    <div class="loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div class="user" id="user">Chargement...</div>

    <div class="alert">
        MAINTENANCE EN COURS
    </div>

    <div class="status">
        Les services intranet sont temporairement indisponibles.<br>
        Mise à jour système en cours.
    </div>

    <div class="status">
        Merci de réessayer ultérieurement.
    </div>

    <button class="logout" onclick="logout()">DÉCONNEXION</button>

</div>

<script>
let user = JSON.parse(localStorage.getItem("lumy_user"));

if(!user){
    window.location.href="index.html";
}

let split = (user.name || "").split(" ");
let prenom = split[0] || "";
let nom = split.slice(1).join(" ") || "";

document.getElementById("user").innerText =
"Connecté : " + prenom + " " + nom;

function logout(){
    localStorage.removeItem("lumy_user");
    window.location.href="index.html";
}
</script>

</body>
</html>
