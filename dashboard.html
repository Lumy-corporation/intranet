<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LUMY CORE | SaaS</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#07090f;
    --panel:#0e111a;
    --panel2:#141826;
    --text:#e6f1ff;
    --muted:#7d8590;
    --accent:#00f2ff;
    --glow:0 0 15px rgba(0,242,255,0.4);
}

body{
    margin:0;
    font-family:Inter;
    background:var(--bg);
    color:var(--text);
}

/* SIDEBAR */
.sidebar{
    width:260px;
    height:100vh;
    background:var(--panel);
    border-right:1px solid rgba(255,255,255,0.05);
    padding:20px;
    position:fixed;
}

.logo{
    font-family:Orbitron;
    color:var(--accent);
    text-shadow:var(--glow);
    margin-bottom:30px;
    letter-spacing:2px;
}

/* BUTTON NAV */
.nav-btn{
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:10px;
    background:transparent;
    border:1px solid transparent;
    color:var(--muted);
    text-align:left;
    cursor:pointer;
    transition:0.2s;
    font-weight:500;
}

.nav-btn:hover{
    border:1px solid var(--accent);
    color:var(--accent);
    box-shadow:var(--glow);
    transform:translateX(3px);
}

/* MAIN */
.main{
    margin-left:260px;
}

/* TOPBAR */
.topbar{
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.search{
    background:var(--panel2);
    border:1px solid rgba(255,255,255,0.08);
    padding:8px 12px;
    border-radius:8px;
    color:var(--text);
}

/* PROFILE */
.profile{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    position:relative;
}

.profile img{
    width:34px;
    height:34px;
    border-radius:50%;
    border:2px solid var(--accent);
    box-shadow:var(--glow);
}

.dropdown{
    position:absolute;
    right:0;
    top:45px;
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.1);
    width:220px;
    padding:12px;
    border-radius:10px;
    display:none;
    backdrop-filter:blur(10px);
}

.drop-btn{
    width:100%;
    margin-top:8px;
    padding:8px;
    background:transparent;
    border:1px solid red;
    color:red;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

.drop-btn:hover{
    background:red;
    color:white;
}

/* CONTENT */
.content{
    padding:20px;
}

/* CARD */
.card{
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.05);
    padding:15px;
    border-radius:14px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* PROJECT ITEM */
.project{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

/* BUTTON ACTION */
.btn{
    padding:6px 10px;
    border-radius:8px;
    border:1px solid var(--accent);
    background:transparent;
    color:var(--accent);
    cursor:pointer;
    transition:0.2s;
    font-size:12px;
}

.btn:hover{
    background:var(--accent);
    color:black;
    box-shadow:var(--glow);
    transform:scale(1.05);
}

/* INPUT */
.input{
    padding:10px;
    width:250px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.1);
    background:var(--panel2);
    color:white;
}

/* STATUS */
.badge{
    padding:3px 8px;
    font-size:11px;
    border-radius:6px;
}

.pending{background:orange;color:black;}
.approved{background:limegreen;color:black;}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">LUMY CORE</div>

    <button class="nav-btn" onclick="nav('dashboard')">📊 Dashboard</button>
    <button class="nav-btn" onclick="nav('members')">👥 Membres</button>
    <button class="nav-btn" onclick="nav('projects')">📁 Projets</button>
    <button class="nav-btn" onclick="nav('apps')">⚙ Apps</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOP -->
<div class="topbar">
    <input class="search" placeholder="Search system...">

    <div class="profile" onclick="toggle()">
        <img id="pp">
        <div class="dropdown" id="drop">
            <div id="name"></div>
            <div id="email"></div>
            <button class="drop-btn" onclick="logout()">DECONNECT</button>
        </div>
    </div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">
    <h2>Salut <span style="color:var(--accent)" id="fullname"></span></h2>
</div>

<!-- MEMBERS -->
<div id="members" style="display:none">
    <div class="card">
        <h3>Membres système</h3>
        <div id="membersList"></div>
    </div>
</div>

<!-- PROJECTS -->
<div id="projects" style="display:none">

    <div class="card">
        <h3>Créer un projet</h3>

        <input id="proj" class="input" placeholder="Nom du projet">
        <button class="btn" onclick="create()">CREATE</button>
    </div>

    <div class="card">
        <h3>Projets</h3>
        <div id="projectList"></div>
    </div>

</div>

<!-- APPS -->
<div id="apps" style="display:none">
    <div class="card">
        <h3>Apps</h3>
        <p>Aucune application déployée</p>
    </div>
</div>

</div>
</div>

<script>

let user = JSON.parse(localStorage.getItem("lumy_user"));

if(!user){
    location.href="index.html";
}

document.getElementById("pp").src=user.photo;
document.getElementById("fullname").innerText=user.name;
document.getElementById("name").innerText=user.name;
document.getElementById("email").innerText=user.email;

function toggle(){
    let d=document.getElementById("drop");
    d.style.display = d.style.display==="block"?"none":"block";
}

function logout(){
    localStorage.removeItem("lumy_user");
    location.href="index.html";
}

function nav(page){
    ["dashboard","members","projects","apps"].forEach(p=>{
        document.getElementById(p).style.display="none";
    });
    document.getElementById(page).style.display="block";
}

// FIRESTORE
const db=firebase.firestore();

// CREATE PROJECT
async function create(){
    let name=document.getElementById("proj").value;

    await db.collection("projects").add({
        title:name,
        owner:user.email,
        status:"pending",
        createdAt:Date.now()
    });

    load();
}

// LOAD
async function load(){

    let m="";
    let ms=await db.collection("users").get();

    ms.forEach(u=>{
        m+=`<div>${u.data().name}</div>`;
    });

    document.getElementById("membersList").innerHTML=m;

    let p="";
    let ps=await db.collection("projects").get();

    ps.forEach(pr=>{
        let d=pr.data();

        p+=`
        <div class="project">
            <div>
                ${d.title}
                <span class="badge ${d.status}">${d.status}</span>
            </div>

            <div>
                ${canValidate() && d.status==="pending"
                ? `<button class="btn" onclick="validate('${pr.id}')">VALIDATE</button>`
                : ""}
            </div>
        </div>`;
    });

    document.getElementById("projectList").innerHTML=p;
}

function canValidate(){
    return user.email==="theo.rabillard@lumycorp.com"
    || user.email==="leo.pujolas@lumycorp.com";
}

async function validate(id){
    await db.collection("projects").doc(id).update({
        status:"approved"
    });

    load();
}

load();

</script>

</body>
</html>
