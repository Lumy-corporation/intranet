<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUMY CORE | Enterprise</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#05070c;
--panel:#0e1522;
--text:#e8f1ff;
--muted:#7b8aa0;
--accent:#00f2ff;
--good:#00ff9d;
--warn:#ffcc00;
--bad:#ff3b3b;
}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:0;top:0;bottom:0;
width:240px;
background:#0a0f18;
padding:20px;
border-right:1px solid rgba(255,255,255,0.05);
}

.brand{
font-family:Orbitron;
color:var(--accent);
margin-bottom:30px;
}

.nav button{
width:100%;
padding:10px;
margin-bottom:8px;
background:transparent;
border:1px solid rgba(255,255,255,0.05);
color:var(--text);
cursor:pointer;
border-radius:8px;
text-align:left;
}

.nav button:hover{
border-color:var(--accent);
}

/* TOP */
.topbar{
position:fixed;
left:240px;right:0;top:0;
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
background:#0b1220;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.main{
margin-left:240px;
padding:80px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(12,1fr);
gap:15px;
}

.card{
background:var(--panel);
padding:15px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.05);
}

.large{grid-column:span 12;}
.medium{grid-column:span 6;}
.small{grid-column:span 4;}

.title{
font-family:Orbitron;
color:var(--accent);
font-size:12px;
margin-bottom:10px;
}

/* CHAT */
.chatBox{
height:250px;
overflow:auto;
background:#05070c;
padding:10px;
border-radius:10px;
}

.msg{
font-size:12px;
margin-bottom:8px;
color:var(--muted);
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.1);
background:#0a0f18;
color:white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="brand">LUMY CORE</div>

<div class="nav">
<button onclick="show('dashboard')">📊 Dashboard</button>
<button onclick="show('users')">👥 Membres</button>
<button onclick="show('projects')">📁 Projets</button>
<button onclick="show('chat')">💬 Chat</button>
<button onclick="logout()">🚪 Déconnexion</button>
</div>
</div>

<!-- TOP -->
<div class="topbar">
<div id="userInfo"></div>
<div id="role"></div>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="grid">

<div class="card large">
<div class="title">WELCOME</div>
<h2 id="welcome"></h2>
</div>

<div class="card small">
<div class="title">MEMBRES</div>
<div id="userCount">0</div>
</div>

<div class="card small">
<div class="title">PROJETS</div>
<div id="projectCount">0</div>
</div>

<div class="card small">
<div class="title">MESSAGES</div>
<div id="msgCount">0</div>
</div>

</div>

<!-- USERS -->
<div id="users" class="grid" style="display:none;">
<div class="card large">
<div class="title">MEMBRES ACTIFS</div>
<div id="usersList"></div>
</div>
</div>

<!-- PROJECTS -->
<div id="projects" class="grid" style="display:none;">
<div class="card large">
<div class="title">PROJETS</div>
<div id="projectsList"></div>
</div>
</div>

<!-- CHAT -->
<div id="chat" class="grid" style="display:none;">

<div class="card large">
<div class="title">CHAT INTERNE</div>

<div class="chatBox" id="chatBox"></div>

<input id="msgInput" placeholder="Message..." onkeydown="send(event)">
</div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"XXX",
projectId:"lumy-corporation-1db3f"
});

const db=firebase.firestore();

/* USER */
const user=JSON.parse(localStorage.getItem("lumy_user"));

if(!user) window.location="index.html";

document.getElementById("welcome").innerText=
"Salut "+user.name;

document.getElementById("userInfo").innerText=user.email;

/* ROLE */
db.collection("users").doc(user.uid).get().then(doc=>{
document.getElementById("role").innerText=doc.data().role;
});

/* NAV */
function show(page){
document.querySelectorAll(".grid").forEach(e=>e.style.display="none");
document.getElementById(page).style.display="grid";
}

/* USERS */
db.collection("users").onSnapshot(s=>{
document.getElementById("userCount").innerText=s.size;

let html="";
s.forEach(d=>{
html+=`<div>${d.data().name} - ${d.data().role}</div>`;
});
document.getElementById("usersList").innerHTML=html;
});

/* PROJECTS */
db.collection("projects").onSnapshot(s=>{
document.getElementById("projectCount").innerText=s.size;

let html="";
s.forEach(d=>{
html+=`<div>${d.data().name} (${d.data().status})</div>`;
});
document.getElementById("projectsList").innerHTML=html;
});

/* CHAT */
db.collection("messages")
.orderBy("createdAt")
.onSnapshot(s=>{
document.getElementById("msgCount").innerText=s.size;

let html="";
s.forEach(d=>{
html+=`<div class="msg">${d.data().userName}: ${d.data().text}</div>`;
});
document.getElementById("chatBox").innerHTML=html;
});

function send(e){
if(e.key==="Enter"){
db.collection("messages").add({
text:e.target.value,
userName:user.name,
createdAt:Date.now()
});
e.target.value="";
}
}

function logout(){
localStorage.removeItem("lumy_user");
location.href="index.html";
}
</script>

</body>
</html>
