<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMY CORE | SaaS Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0b0c10;
    --panel:#12141b;
    --panel2:#161925;
    --text:#ffffff;
    --muted:#8b8f98;
    --accent:#00f2ff;
    --border:rgba(255,255,255,0.08);
}

/* LIGHT MODE AUTO */
@media (prefers-color-scheme: light){
:root{
    --bg:#f4f6fb;
    --panel:#ffffff;
    --panel2:#eef2f7;
    --text:#0b0c10;
    --muted:#5c6470;
    --border:rgba(0,0,0,0.08);
}}

body{
    margin:0;
    font-family:Inter;
    background:var(--bg);
    color:var(--text);
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    height:100vh;
    background:var(--panel);
    border-right:1px solid var(--border);
    padding:20px;
    box-sizing:border-box;
}

.logo{
    font-family:Orbitron;
    color:var(--accent);
    font-size:14px;
    margin-bottom:30px;
}

.nav-item{
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    color:var(--muted);
    cursor:pointer;
    font-size:13px;
}

.nav-item:hover{
    background:var(--panel2);
    color:var(--accent);
}

/* MAIN */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* TOPBAR */
.topbar{
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    border-bottom:1px solid var(--border);
    background:var(--panel);
}

.search{
    background:var(--panel2);
    border:1px solid var(--border);
    padding:8px 12px;
    border-radius:10px;
    width:300px;
    color:var(--text);
}

/* PROFILE */
.profile{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    position:relative;
}

.profile img{
    width:32px;
    height:32px;
    border-radius:50%;
    border:2px solid var(--accent);
}

.dropdown{
    position:absolute;
    right:0;
    top:45px;
    background:var(--panel);
    border:1px solid var(--border);
    width:220px;
    border-radius:12px;
    padding:12px;
    display:none;
}

.dropdown p{
    font-size:12px;
    margin:5px 0;
    color:var(--muted);
}

.logout{
    width:100%;
    margin-top:10px;
    padding:8px;
    border:1px solid red;
    background:transparent;
    color:red;
    border-radius:8px;
    cursor:pointer;
}

/* CONTENT */
.content{
    padding:20px;
}

/* KPI CARDS */
.kpi-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.card{
    background:var(--panel);
    border:1px solid var(--border);
    padding:15px;
    border-radius:15px;
}

.kpi{
    font-size:20px;
    font-weight:700;
}

.label{
    font-size:12px;
    color:var(--muted);
}

/* WELCOME */
.welcome{
    margin:20px 0;
    font-size:20px;
}

.accent{color:var(--accent);}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">LUMY CORE</div>

    <div class="nav-item">📊 Dashboard</div>
    <div class="nav-item">👥 Membres</div>
    <div class="nav-item">⚙ Apps</div>
    <div class="nav-item">📁 Projets</div>
    <div class="nav-item">🔐 Sécurité</div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <input class="search" placeholder="Rechercher...">

        <div class="profile" onclick="toggle()">
            <img id="pp">
            <div class="dropdown" id="dd">
                <p id="name"></p>
                <p id="email"></p>
                <button class="logout" onclick="logout()">Déconnexion</button>
            </div>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="welcome">
            Salut <span class="accent" id="fullname"></span> 👋
        </div>

        <!-- KPI -->
        <div class="kpi-grid">

            <div class="card">
                <div class="kpi">128</div>
                <div class="label">Utilisateurs actifs</div>
            </div>

            <div class="card">
                <div class="kpi">12</div>
                <div class="label">Applications</div>
            </div>

            <div class="card">
                <div class="kpi">3</div>
                <div class="label">Services critiques</div>
            </div>

        </div>

    </div>
</div>

<script>
const user = JSON.parse(localStorage.getItem("lumy_user"));

if(!user){
    window.location.href="index.html";
}

document.getElementById("pp").src = user.photo || "";
document.getElementById("fullname").innerText = user.given_name || user.name || "";
document.getElementById("name").innerText = user.name || "";
document.getElementById("email").innerText = user.email || "";

function toggle(){
    const d=document.getElementById("dd");
    d.style.display = d.style.display==="block"?"none":"block";
}

function logout(){
    localStorage.removeItem("lumy_user");
    window.location.href="index.html";
}
</script>

</body>
</html>
