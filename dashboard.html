<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMY CORP | INTRANET</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#050505;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:280px;
height:100vh;
background:#0a0a0a;
border-right:1px solid #1a1a1a;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:30px;
}

.logo img{
width:40px;
height:40px;
border-radius:8px;
}

.logo span{
font-family:Orbitron;
color:#00f2ff;
letter-spacing:2px;
}

.menu button{
width:100%;
padding:12px;
margin-bottom:10px;
background:#111;
border:1px solid #1f1f1f;
color:white;
text-align:left;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.menu button:hover{
border-color:#00f2ff;
transform:translateX(3px);
}

/* MAIN */
.main{
flex:1;
padding:25px;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.profile{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}

.profile img{
width:38px;
height:38px;
border-radius:50%;
border:1px solid #00f2ff;
}

/* CARD */
.card{
background:#0b0b0b;
border:1px solid #1a1a1a;
padding:20px;
border-radius:12px;
}

/* TITLES */
.title{
font-family:Orbitron;
color:#00f2ff;
margin-bottom:15px;
}

/* LIST */
.item{
padding:10px;
border-bottom:1px solid #1a1a1a;
}

/* CHAT */
.chatBox{
height:400px;
overflow:auto;
border:1px solid #1a1a1a;
padding:10px;
margin-bottom:10px;
}

input{
width:80%;
padding:10px;
background:#111;
border:1px solid #1f1f1f;
color:white;
}

.sendBtn{
padding:10px;
background:#00f2ff;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
<img src="https://i.postimg.cc/ZCfjHWMY/logo.png" alt="logo">
<span>LUMY CORE</span>
</div>

<div class="menu">
<button onclick="dashboard()">Dashboard</button>
<button onclick="members()">Membres</button>
<button onclick="projects()">Projets</button>
<button onclick="chat()">Chat</button>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">

<div id="welcome">Chargement...</div>

<div class="profile" onclick="profile()">
<img id="pp">
</div>

</div>

<div class="card" id="content">
Chargement...
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey:"XXX",
authDomain:"XXX",
projectId:"XXX",
storageBucket:"XXX",
messagingSenderId:"XXX",
appId:"XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* USER */
const user = JSON.parse(localStorage.getItem("lumy_user"));

if(!user){
window.location.href="login.html";
}

document.getElementById("welcome").innerText =
"Bienvenue " + user.given_name + " " + user.family_name;

document.getElementById("pp").src = user.picture;

/* DASHBOARD */
window.dashboard = function(){
document.getElementById("content").innerHTML =
"<div class='title'>DASHBOARD</div>Intranet Lumy Core V3 opérationnel.";
}

/* MEMBERS */
window.members = async function(){

const snap = await getDocs(collection(db,"users"));

let html = "<div class='title'>MEMBRES</div>";

snap.forEach(d=>{
const u = d.data();

html += `
<div class="item">
<b>${u.firstName||""} ${u.lastName||""}</b><br>
${u.email||""}<br>
<small>${u.role||"user"}</small>
</div>
`;
});

document.getElementById("content").innerHTML = html;
}

/* PROJECTS */
window.projects = async function(){

const snap = await getDocs(collection(db,"projects"));

let html = "<div class='title'>PROJETS</div>";

snap.forEach(d=>{
const p = d.data();

html += `
<div class="item">
<b>${p.name}</b><br>
${p.status||"pending"}
</div>
`;
});

document.getElementById("content").innerHTML = html;
}

/* CHAT REALTIME */
window.chat = function(){

document.getElementById("content").innerHTML = `
<div class="title">CHAT INTERNE</div>

<div class="chatBox" id="chat"></div>

<input id="msg">
<button class="sendBtn" onclick="send()">Envoyer</button>
`;

const q = query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,(snap)=>{
let box = document.getElementById("chat");
box.innerHTML="";

snap.forEach(d=>{
const m=d.data();
box.innerHTML += `<div class="item"><b>${m.user}</b> : ${m.text}</div>`;
});

box.scrollTop = box.scrollHeight;
});
}

/* SEND */
window.send = async function(){

let input = document.getElementById("msg");

if(!input.value) return;

await addDoc(collection(db,"messages"),{
text:input.value,
user:user.given_name,
time:Date.now()
});

input.value="";
}

/* PROFILE */
window.profile = function(){
alert(user.name + "\n" + user.email);
}

/* LOGOUT */
window.logout = function(){
localStorage.removeItem("lumy_user");
signOut(auth);
window.location.href="login.html";
}

</script>

</body>
</html>
