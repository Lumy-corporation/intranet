<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DASHBOARD | LUMY CORP</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js"></script>
    <script async defer src="https://apis.google.com/js/api.js" onload="initGapi()"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
    <header style="padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between;">
        <h1>LUMY DASHBOARD</h1>
        <button onclick="logout()" style="background:none; color:red; border:1px solid red; cursor:pointer;">DÉCONNEXION</button>
    </header>

    <main style="padding: 40px;">
        <h2>Bienvenue, <span id="user-display"></span></h2>
        <p>C'est ici que tu créeras tes dizaines d'agents demain !</p>
    </main>

    <script>
        // On vérifie l'auth direct
        checkAuth();
        document.getElementById('user-display').innerText = localStorage.getItem('userName');

        let tokenClient;

        function initGapi() {
            gapi.load('client', async () => {
                await gapi.client.init({
                    apiKey: API_KEY,
                    discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/admin/directory_1/rest'],
                });
                
                // Si on a déjà un token, on le met
                const savedToken = localStorage.getItem('google_token');
                if(savedToken) gapi.client.setToken(JSON.parse(savedToken));

                // On prépare le client pour demander le token complet si besoin
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: (resp) => {
                        localStorage.setItem('google_token', JSON.stringify(resp));
                        gapi.client.setToken(resp);
                        location.reload(); 
                    }
                });

                // Si on n'a pas le token complet de l'API Admin, on le demande une fois
                if(!localStorage.getItem('google_token')) {
                    tokenClient.requestAccessToken();
                }
            });
        }
    </script>
</body>
</html>
