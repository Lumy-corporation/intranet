<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LUMY | Intranet Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f0f3; padding: 40px; }
        h1 { font-family: 'Orbitron'; letter-spacing: 5px; color: #1d1d1f; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        
        /* La "Carte" du candidat */
        .candidate-card {
            background: white; border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .candidate-card h2 { color: #0056ff; font-size: 1.2rem; margin-bottom: 5px; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; }
        .tag-sector { background: #e3f2fd; color: #0d47a1; }
        .info { font-size: 0.85rem; color: #555; margin-bottom: 8px; }
        .motivation { background: #f9f9f9; padding: 10px; border-radius: 10px; font-style: italic; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>LUMY_CENTRAL_DATA</h1>
    <div id="loading">Initialisation du flux de données...</div>
    <div class="grid" id="candidates-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjIUOQogsQUhRgYJgN1OlErEt3FsihZuo",
        authDomain: "lumy-corporation-1db3f.firebaseapp.com",
        databaseURL: "https://lumy-corporation-1db3f-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "lumy-corporation-1db3f",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const container = document.getElementById('candidates-container');

    // On écoute la base de données en temps réel
    onValue(ref(db, 'inscriptions'), (snapshot) => {
        document.getElementById('loading').style.display = 'none';
        container.innerHTML = ""; // On vide pour rafraîchir
        
        const data = snapshot.val();
        if (data) {
            Object.keys(data).reverse().forEach(key => {
                const c = data[key];
                const card = document.body.appendChild(document.createElement('div'));
                container.innerHTML += `
                    <div class="candidate-card">
                        <span class="tag tag-sector">${c.secteur_lumy}</span>
                        <h2>${c.prenom} ${c.nom}</h2>
                        <div class="info">📧 ${c.email}</div>
                        <div class="info">🌍 ${c.pays} | 🎓 ${c.etudes_level}</div>
                        <div class="info">📅 Inscrit le : ${c.date_inscription}</div>
                        <div class="motivation">" ${c.motivation} "</div>
                    </div>
                `;
            });
        } else {
            container.innerHTML = "Aucune donnée reçue pour le moment.";
        }
    });
</script>
</body>
</html>
