<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMY CORP | MAINTENANCE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050505;
--cyan:#00f2ff;
}

/* GLOBAL */
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#050505;
color:white;
font-family:Inter;
overflow:hidden;
}

/* BACKGROUND GLOW */
.bg{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 20%, rgba(0,242,255,0.08), transparent 40%),
radial-gradient(circle at 70% 80%, rgba(0,242,255,0.06), transparent 40%);
z-index:0;
}

/* GRID */
.grid{
position:absolute;
width:200%;
height:200%;
background-image:
linear-gradient(#111 1px, transparent 1px),
linear-gradient(90deg, #111 1px, transparent 1px);
background-size:60px 60px;
opacity:0.08;
transform:rotate(25deg);
animation:move 30s linear infinite;
}

@keyframes move{
from{transform:translateY(0) rotate(25deg);}
to{transform:translateY(-200px) rotate(25deg);}
}

/* HERO */
.container{
z-index:2;
text-align:center;
max-width:700px;
padding:40px;
}

/* LOGO */
.logo{
width:170px;
margin-bottom:25px;
filter: drop-shadow(0 0 25px rgba(0,242,255,0.35));
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

/* TITLE */
.title{
font-family:Orbitron;
font-size:26px;
letter-spacing:4px;
color:white;
margin-bottom:10px;
}

/* SUB */
.subtitle{
font-size:14px;
opacity:0.6;
margin-bottom:30px;
}

/* LOADER */
.loader{
width:60px;
height:60px;
border:3px solid #111;
border-top:3px solid var(--cyan);
border-radius:50%;
margin:30px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* STATUS */
.status{
font-size:12px;
opacity:0.7;
min-height:20px;
}

/* BUTTON */
.btn{
margin-top:35px;
padding:12px 20px;
background:transparent;
border:1px solid var(--cyan);
color:var(--cyan);
cursor:pointer;
border-radius:8px;
font-family:Orbitron;
font-size:11px;
letter-spacing:2px;
transition:0.3s;
}

.btn:hover{
background:var(--cyan);
color:black;
box-shadow:0 0 20px rgba(0,242,255,0.3);
}

/* FOOTER */
.footer{
position:absolute;
bottom:15px;
font-size:10px;
opacity:0.3;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="grid"></div>

<div class="container">

<img src="https://i.postimg.cc/BbnFcJFS/Lumylogo.png" class="logo">

<div class="title">SYSTEM MAINTENANCE</div>

<div class="subtitle">
Lumy Core est actuellement en mise à jour.<br>
Nos équipes déploient une nouvelle version du système.
</div>

<div class="loader"></div>

<div class="status" id="status">
Initialisation...
</div>

<button class="btn" onclick="logout()">SE DÉCONNECTER</button>

</div>

<div class="footer">
Lumy Corporation • Infrastructure Sécurisée
</div>

<script>

const messages = [
"Initialisation des services...",
"Connexion aux serveurs...",
"Synchronisation des données...",
"Vérification des accès...",
"Déploiement des modules...",
"Système en cours de stabilisation..."
];

let i = 0;

setInterval(()=>{
document.getElementById("status").innerText = messages[i];
i = (i + 1) % messages.length;
},2000);

/* LOGOUT SAFE */
function logout(){
localStorage.removeItem("lumy_user");

/* si Firebase est utilisé */
if (window.firebase && firebase.auth){
firebase.auth().signOut();
}

/* pas de redirection automatique */
alert("Vous êtes déconnecté.");
}

</script>

</body>
</html>
