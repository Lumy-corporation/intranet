<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMY CORE | MAINTENANCE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050505;
--cyan:#00f2ff;
--card:#0b0b0b;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top, #0a0a0a, var(--bg));
font-family:Inter;
color:white;
overflow:hidden;
}

/* BACKGROUND GRID */
.grid{
position:absolute;
width:200%;
height:200%;
background-image:
linear-gradient(#111 1px, transparent 1px),
linear-gradient(90deg, #111 1px, transparent 1px);
background-size:60px 60px;
transform:rotate(25deg);
opacity:0.12;
animation:move 25s linear infinite;
}

@keyframes move{
from{transform:translateY(0) rotate(25deg);}
to{transform:translateY(-200px) rotate(25deg);}
}

/* MAIN CARD */
.container{
z-index:2;
text-align:center;
width:520px;
padding:50px;
background:rgba(10,10,10,0.85);
border:1px solid #1a1a1a;
border-radius:20px;
backdrop-filter: blur(12px);
box-shadow:0 0 90px rgba(0,242,255,0.05);
}

/* LOGO */
.logo{
width:160px;
height:auto;
object-fit:contain;
margin-bottom:20px;
filter: drop-shadow(0 0 18px rgba(0,242,255,0.35));
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

/* TITLE */
.title{
font-family:Orbitron;
font-size:18px;
letter-spacing:3px;
color:var(--cyan);
margin-bottom:10px;
}

/* SUBTITLE */
.subtitle{
opacity:0.6;
font-size:13px;
margin-bottom:25px;
}

/* LOADER */
.loader{
width:52px;
height:52px;
border:3px solid #1a1a1a;
border-top:3px solid var(--cyan);
border-radius:50%;
margin:20px auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* PROGRESS BAR */
.progress{
width:100%;
height:4px;
background:#111;
border-radius:10px;
overflow:hidden;
margin-top:20px;
}

.bar{
height:100%;
width:0%;
background:var(--cyan);
animation:load 6s ease-in-out infinite;
}

@keyframes load{
0%{width:0%}
50%{width:85%}
100%{width:100%}
}

/* STATUS TEXT */
.status{
font-size:12px;
opacity:0.7;
margin-top:15px;
min-height:20px;
}

/* BUTTON */
button{
margin-top:25px;
padding:12px;
width:100%;
background:transparent;
border:1px solid var(--cyan);
color:var(--cyan);
cursor:pointer;
border-radius:8px;
transition:0.3s;
font-family:Orbitron;
font-size:11px;
letter-spacing:1px;
}

button:hover{
background:var(--cyan);
color:black;
}

/* FOOTER */
.footer{
position:absolute;
bottom:10px;
font-size:10px;
opacity:0.4;
}

/* FADE IN */
.fade{
animation:fadeIn 1s ease-out;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.95);}
to{opacity:1;transform:scale(1);}
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="container fade">

<!-- LOGO -->
<img class="logo" src="https://i.postimg.cc/BbnFcJFS/Lumylogo.png" alt="Lumy Logo">

<div class="title">MAINTENANCE SYSTÈME</div>

<div class="subtitle">
L’intranet Lumy Core est temporairement indisponible<br>
Mise à jour sécurisée en cours
</div>

<div class="loader"></div>

<div class="progress">
<div class="bar"></div>
</div>

<div class="status" id="status">Initialisation des services...</div>

<button onclick="checkStatus()">STATUT SYSTÈME</button>

</div>

<div class="footer">
Lumy Corporation • Secure Cloud Intranet
</div>

<script>

const messages = [
"Initialisation des services...",
"Synchronisation Firestore...",
"Vérification des permissions...",
"Chargement des modules internes...",
"Optimisation du système...",
"Sécurisation des endpoints...",
"Système en cours de stabilisation..."
];

let i = 0;

setInterval(()=>{
document.getElementById("status").innerText = messages[i];
i = (i + 1) % messages.length;
},2000);

/* SAFE SYSTEM BUTTON */
function checkStatus(){
alert("Système en maintenance. Aucun accès disponible pour le moment.");
}

</script>

</body>
</html>
